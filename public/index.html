const API = '/api';
const AI_API = '/api/ai';

// ─── In-memory session token (storage is blocked in sandboxed iframes) ─────────
let SESSION_TOKEN = null;

async function apiFetch(path, options = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const url = SESSION_TOKEN
    ? `${API}${path}${sep}token=${SESSION_TOKEN}`
    : `${API}${path}`;
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    ...options,
  });
  const text = await res.text();
  try { return JSON.parse(text); } catch { return {}; }
}

// ─── Robust JSON Parser (multi-stage AI response repair) ────────────────────
function robustJsonParse(raw) {
  if (!raw || typeof raw !== 'string') throw new Error('Empty or non-string input');
  let s = raw.trim();
  // Stage 1: Strip markdown fences
  s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
  // Stage 2: Extract from first { to last }
  const start = s.indexOf('{');
  const end = s.lastIndexOf('}');
  if (start !== -1 && end !== -1 && end > start) s = s.slice(start, end + 1);
  // Stage 3: Replace smart quotes, tabs
  s = s.replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"').replace(/\t/g, ' ');
  // Stage 4: Try direct parse
  try { return JSON.parse(s); } catch {}
  // Stage 5: Fix trailing commas
  s = s.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
  try { return JSON.parse(s); } catch {}
  // Stage 6: Fix newlines inside strings (walk char by char)
  let fixed = ''; let inString = false; let escape = false;
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (escape) { fixed += c; escape = false; continue; }
    if (c === '\\') { fixed += c; escape = true; continue; }
    if (c === '"') inString = !inString;
    if (inString && (c === '\n' || c === '\r')) { fixed += ' '; continue; }
    fixed += c;
  }
  try { return JSON.parse(fixed); } catch {}
  // Stage 9: Aggressive backward walk — try parsing at each closing brace
  for (let i = fixed.length - 1; i >= 0; i--) {
    if (fixed[i] === '}') {
      try { return JSON.parse(fixed.slice(0, i + 1)); } catch {}
    }
  }
  throw new Error('JSON parse failed after all repair stages. Raw: ' + s.slice(0, 100));
}

// ─── Toast Notification System ──────────────────────────────────────────────
const toastListeners = [];
function showToast(message, type = 'success') {
  toastListeners.forEach(fn => fn({ message, type, id: Date.now() }));
}

function ToastContainer({ T }) {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    const handler = (t) => {
      setToasts(prev => [...prev, t]);
      setTimeout(() => setToasts(prev => prev.filter(x => x.id !== t.id)), 3000);
    };
    toastListeners.push(handler);
    return () => { const idx = toastListeners.indexOf(handler); if (idx > -1) toastListeners.splice(idx, 1); };
  }, []);
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8 }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          padding: '10px 16px', borderRadius: 8, fontSize: 13, fontWeight: 500, color: '#fff',
          background: t.type === 'error' ? '#C0392B' : t.type === 'warning' ? '#B8860B' : '#1C3C34',
          boxShadow: '0 4px 12px rgba(0,0,0,0.15)', animation: 'slideIn 0.2s ease',
          display: 'flex', alignItems: 'center', gap: 8, maxWidth: 320,
        }}>
          <span>{t.type === 'error' ? '✕' : t.type === 'warning' ? '⚠' : '✓'}</span>
          {t.message}
        </div>
      ))}
    </div>
  );
}

// ─── Skeleton Loader ──────────────────────────────────────────────────────────
function Skeleton({ T, width = '100%', height = 16, style = {} }) {
  return (
    <div style={{
      width, height, borderRadius: 6, background: T.border,
      animation: 'pulse 1.5s ease-in-out infinite', ...style,
    }} />
  );
}


function useTheme() {
  const [mode, setMode] = useState('light');
  const T = mode === 'light' ? LIGHT : DARK;
  const toggle = () => {
    const next = mode === 'light' ? 'dark' : 'light';
    setMode(next);
    apiFetch('/settings', { method: 'POST', body: JSON.stringify({ key: 'theme', value: next }) });
  };
  return { T, mode, toggle, setMode };
}

function Card({ T, children, style = {}, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: T.bgCard, border: `1px solid ${T.border}`,
      borderRadius: 12, boxShadow: T.shadow, ...style,
    }}>
      {children}
    </div>
  );
}

function Btn({ T, variant = 'primary', children, onClick, style = {}, disabled = false, small = false }) {
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 6,
    padding: small ? '6px 12px' : '9px 18px',
    borderRadius: 8, fontSize: small ? 12 : 13, fontWeight: 600,
    cursor: disabled ? 'not-allowed' : 'pointer', transition: 'all 0.15s',
    opacity: disabled ? 0.5 : 1, ...style,
  };
  if (variant === 'primary') return (
    <button onClick={onClick} disabled={disabled} style={{ ...base, background: T.btnPrimaryBg, color: T.btnPrimaryText, border: 'none' }}>
      {children}
    </button>
  );
  if (variant === 'danger') return (
    <button onClick={onClick} disabled={disabled} style={{ ...base, background: T.red, color: '#fff', border: 'none' }}>
      {children}
    </button>
  );
  return (
    <button onClick={onClick} disabled={disabled} style={{ ...base, background: 'transparent', color: T.text, border: `1px solid ${T.border}` }}>
      {children}
    </button>
  );
}

    color: T.text, fontSize: 13, outline: 'none',
    fontFamily: "'DM Sans', system-ui, sans-serif",
    transition: 'border-color 0.15s', ...style,
  };

const INTAKE_DEFAULTS = {
  company: { name: '', website: '', description: '', size_range: '', industry: '' },
  offer: { name: '', description: '', pricing_model: '', avg_deal_size: '', differentiators: '' },
  icp: { description: '', company_size: { min: '', max: '' }, industries: '', geographies: '', technographics: '', excluded_segments: '' },
  value_props: { primary: '', secondary: '', proof_points: '' },
  pain_points: { primary: '', secondary: '', status_quo_cost: '' },
  constraints: { excluded_titles: '', tone_preference: '', compliance_notes: '', other: '' },
};

function deepMerge(target, source) {
  const result = { ...target };
  for (const key in source) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
      result[key] = deepMerge(target[key] || {}, source[key]);
    } else {
      result[key] = source[key];
    }
  }
  return result;
}

// Merge scanned/imported data into intake — only fills empty fields
function mergeIntoEmpty(existing, scanned) {
  const result = JSON.parse(JSON.stringify(existing));
  for (const section in scanned) {
    if (!result[section]) result[section] = {};
    if (typeof scanned[section] === 'object' && !Array.isArray(scanned[section])) {
      for (const field in scanned[section]) {
        if (typeof scanned[section][field] === 'object' && !Array.isArray(scanned[section][field])) {
          if (!result[section][field]) result[section][field] = {};
          for (const sub in scanned[section][field]) {
            if (!result[section][field][sub]) result[section][field][sub] = scanned[section][field][sub];
          }
        } else {
          if (!result[section][field]) result[section][field] = scanned[section][field];
        }
      }
    }
  }
  return result;
}

ICP: ${i.icp.description} | Size: ${i.icp.company_size.min}-${i.icp.company_size.max} | Industries: ${i.icp.industries} | Geo: ${i.icp.geographies} | Tech: ${i.icp.technographics} | Exclude: ${i.icp.excluded_segments}
Value Props: ${i.value_props.primary} | ${i.value_props.secondary} | Proof: ${i.value_props.proof_points}

function IntakeForm({ T, workspaceId, onIntakeChange }) {
  const [intake, setIntake] = useState(INTAKE_DEFAULTS);
  const [scanUrl, setScanUrl] = useState('');
  const [scanning, setScanning] = useState(false);
  const [scanMsg, setScanMsg] = useState('');
  const [notes, setNotes] = useState('');
  const [notesSource, setNotesSource] = useState('Circleback');
  const [importing, setImporting] = useState(false);
  const [importMsg, setImportMsg] = useState('');
  const debounceRef = useRef(null);

  useEffect(() => {
    apiFetch(`/intake?workspace_id=${workspaceId}`).then(data => {
      if (data && Object.keys(data).length > 0) {
        const merged = deepMerge(INTAKE_DEFAULTS, data);
        setIntake(merged);
        if (onIntakeChange) onIntakeChange(merged);
      }
    });
  }, [workspaceId]);

  const save = useCallback((newIntake) => {
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      apiFetch('/intake', { method: 'POST', body: JSON.stringify({ workspace_id: workspaceId, data: newIntake }) })
        .then(() => showToast('Intake saved', 'success'));
      if (onIntakeChange) onIntakeChange(newIntake);
    }, 800);
  }, [workspaceId]);

  const update = (section, field, val) => {
    const next = { ...intake, [section]: { ...intake[section], [field]: val } };
    setIntake(next); save(next);
  };
  const updateNested = (section, sub, field, val) => {
    const next = { ...intake, [section]: { ...intake[section], [sub]: { ...intake[section][sub], [field]: val } } };
    setIntake(next); save(next);
  };

  const handleScan = async () => {
    if (!scanUrl) return;
    setScanning(true); setScanMsg('Scanning website with AI + web search…');
    try {
      const res = await fetch(AI_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'scan_website', url: scanUrl }),
      });
      const result = await res.json();
      if (result.ok && result.text) {
        const parsed = robustJsonParse(result.text);
        const merged = mergeIntoEmpty(intake, parsed);
        setIntake(merged); save(merged);
        setScanMsg(`Scan complete via ${result.provider} (${result.model}). Empty fields filled from web research.`);
        showToast('Website scanned — data merged into empty fields', 'success');
      } else {
        setScanMsg('Scan failed: ' + (result.error || 'Unknown error'));
        showToast('Website scan failed', 'error');
      }
    } catch (err) {
      setScanMsg('Scan error: ' + err.message);
      showToast('Scan error', 'error');
    }
    setScanning(false);
  };

  const handleImport = async () => {
    if (!notes) return;

// ─── Strategy Generation Panel ────────────────────────────────────────────────
function StrategyGenerator({ T, workspaceId, onStrategyGenerated, intake }) {
  const [progress, setProgress] = useState(0);
  const [status, setStatus] = useState('');
  const [running, setRunning] = useState(false);
  const [model, setModel] = useState('sonnet');
  const [error, setError] = useState('');

  const runStrategyLive = async () => {
    setRunning(true); setProgress(0); setError('');
    setStatus('Loading intake data…');
    setProgress(5);

    // Build intake block
    const currentIntake = intake || INTAKE_DEFAULTS;
    const companyName = currentIntake.company.name || 'Unknown Company';
    const intakeBlock = buildIntakeBlock(currentIntake);

    setProgress(10); setStatus('Generating research & targeting (Part A)…');

    try {
      // Sequential calls to avoid CGI timeout — Part A first
      let resA, resB;
      try {
        const rawA = await fetch(AI_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'strategy_part_a', company_name: companyName, intake_block: intakeBlock, model }),
        });
        resA = await rawA.json();
      } catch (e) {
        resA = { ok: false, error: 'Part A network error: ' + e.message };
      }

      setProgress(45); setStatus('Part A received. Generating execution & messaging (Part B)…');

      try {
        const rawB = await fetch(AI_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'strategy_part_b', company_name: companyName, intake_block: intakeBlock, model }),
        });
        resB = await rawB.json();
      } catch (e) {
        resB = { ok: false, error: 'Part B network error: ' + e.message };
      }

      setProgress(70); setStatus('Both responses received, parsing…');

      let parsedA = {}, parsedB = {};
      if (resA.ok && resA.text) {
        try { parsedA = robustJsonParse(resA.text); } catch (e) { console.warn('Part A parse error:', e); }
      } else {
        console.warn('Part A failed:', resA.error);
      }
      if (resB.ok && resB.text) {
        try { parsedB = robustJsonParse(resB.text); } catch (e) { console.warn('Part B parse error:', e); }
      } else {
        console.warn('Part B failed:', resB.error);
      }

      if (!resA.ok && !resB.ok) {
        setError(`Both API calls failed. A: ${resA.error || 'unknown'}. B: ${resB.error || 'unknown'}`);
        setRunning(false);
        showToast('Strategy generation failed', 'error');
        return;
      }

      setProgress(85); setStatus('Merging strategy halves…');
      const fullStrategy = { ...parsedA, ...parsedB };

      setProgress(92); setStatus('Saving strategy…');
      await apiFetch('/strategy', {
        method: 'POST',
        body: JSON.stringify({ workspace_id: workspaceId, data: fullStrategy }),
      });

      setProgress(100); setStatus(`Strategy complete! Generated via ${resA.provider || 'AI'} (${resA.model || model})`);
      showToast('Strategy generated successfully', 'success');
      onStrategyGenerated(fullStrategy);
    } catch (err) {
      setError('Network error: ' + err.message);
      showToast('Strategy generation error', 'error');
    }
    setRunning(false);
  };

  const runStrategyDemo = async () => {
    setRunning(true); setProgress(0); setStatus('Loading demo strategy…');
    const steps = [
      [400, 25, 'Simulating Part A…'], [400, 50, 'Simulating Part B…'],
      [300, 75, 'Merging…'], [200, 100, 'Demo strategy loaded!'],
    ];
    for (const [delay, pct, msg] of steps) {
      await new Promise(r => setTimeout(r, delay));
      setProgress(pct); setStatus(msg);
    }
    await apiFetch('/strategy', { method: 'POST', body: JSON.stringify({ workspace_id: workspaceId, data: DEMO_STRATEGY }) });
    onStrategyGenerated(DEMO_STRATEGY);
    setRunning(false);
  };

  return (
    <Card T={T} style={{ padding: 24, marginBottom: 20 }}>
      <div style={{ fontWeight: 700, fontSize: 15, color: T.text, marginBottom: 8 }}>Strategy Generation</div>
      <div style={{ fontSize: 13, color: T.textMuted, marginBottom: 16 }}>
        Runs two parallel AI calls (Research &amp; Targeting + Execution &amp; Messaging) via Claude Sonnet, with OpenAI fallback. Merges into a complete 11-section strategy.
      </div>
      <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 16, flexWrap: 'wrap' }}>
        <span style={{ fontSize: 12, color: T.textMuted }}>Model:</span>
        <select value={model} onChange={e => setModel(e.target.value)} style={{
          padding: '4px 8px', borderRadius: 6, border: `1px solid ${T.border}`, background: T.bgInput,
          color: T.text, fontSize: 12, fontFamily: 'inherit',
        }}>
          <option value="sonnet">Claude Sonnet (Best)</option>
          <option value="haiku">Claude Haiku (Fast)</option>
          <option value="gpt4o">GPT-4o (Fallback)</option>
          <option value="gpt4o-mini">GPT-4o Mini (Fast/Cheap)</option>
        </select>
      </div>
      {running && (
        <div style={{ marginBottom: 16 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ fontSize: 12, color: T.textMuted }}>{status}</span>
            <span style={{ fontSize: 12, fontWeight: 700, color: T.accent }}>{progress}%</span>
          </div>
          <div style={{ height: 6, borderRadius: 3, background: T.border, overflow: 'hidden' }}>
            <div style={{ width: `${progress}%`, height: '100%', background: T.accent, borderRadius: 3, transition: 'width 0.5s ease' }} />
          </div>
        </div>
      )}
      {error && <div style={{ marginBottom: 12, padding: '8px 12px', borderRadius: 6, background: T.redBg, color: T.red, fontSize: 12 }}>{error}</div>}
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
        <Btn T={T} onClick={runStrategyLive} disabled={running}>
          {running ? `Running… ${progress}%` : '▶ Run Strategy (AI)'}
        </Btn>
        <Btn T={T} onClick={runStrategyDemo} disabled={running} secondary>
          Demo Data
        </Btn>
      </div>
    </Card>
  );
}

function StrategyView({ T, strategy, workspaceId }) {
  const [activeTab, setActiveTab] = useState('icp');
  const [editMode, setEditMode] = useState(false);
  const [strat, setStrat] = useState(strategy);
  const [saveState, setSaveState] = useState('saved');
  const saveTimer = useRef(null);

  const updateStrategy = (newStrat) => {
    setStrat(newStrat);
    setSaveState('unsaved');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      setSaveState('saving');
      apiFetch('/strategy', { method: 'POST', body: JSON.stringify({ workspace_id: workspaceId, data: newStrat }) })
        .then(() => { setSaveState('saved'); showToast('Strategy saved'); });
    }, 800);
  };

  const renderTab = () => {
    const props = { T, strategy: strat, editMode, onChange: updateStrategy };
    switch (activeTab) {
      case 'icp': return <ICPTab {...props} />;
      case 'dm': return <DMTab T={T} strategy={strat} editMode={editMode} onChange={updateStrategy} />;
      case 'channel': return <ChannelTab {...props} />;
      case 'messaging': return <MessagingTab {...props} />;
      case 'valueprop': return <ValuePropTab {...props} />;
      case 'meeting': return <MeetingTab {...props} />;
      case 'salesnav': return <SalesNavTab {...props} />;
      case 'risk': return <RiskTab {...props} />;
      case 'flow': return <FlowTab {...props} />;
      case 'followup': return <FollowupTab {...props} />;
      case 'exec': return <ExecTab {...props} />;
      default: return null;
    }
  };

  return (
    <div>
      {/* Strategy Summary Banner */}
      <Card T={T} style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12 }}>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4 }}>Generated Strategy</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: T.text, letterSpacing: '-0.3px', marginBottom: 6 }}>{strat.client_name || 'Strategy'}</div>
            {strat.offer_summary && <div style={{ fontSize: 13, color: T.textMuted, lineHeight: 1.6, maxWidth: 640 }}>{strat.offer_summary}</div>}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 11, color: T.textMuted, minWidth: 60 }}>
              {saveState === 'saving' ? '⏳ Saving…' : saveState === 'unsaved' ? '● Unsaved' : '✓ Saved'}
            </span>
            <Btn T={T} variant={editMode ? 'primary' : 'outline'} small onClick={() => setEditMode(!editMode)}>
              {editMode ? '✓ Done Editing' : '✏ Edit Mode'}
            </Btn>
          </div>
        </div>
      </Card>
      <StrategyTabs T={T} activeTab={activeTab} onSelect={setActiveTab} />
      <div style={{ marginTop: 4 }}>{renderTab()}</div>
    </div>
  );
}

// ─── Workspace Detail ─────────────────────────────────────────────────────────
function WorkspaceDetail({ T, workspace, onBack, onDeleted, user }) {
  const [ws, setWs] = useState(workspace);
  const [activeTab, setActiveTab] = useState('intake');
  const [strategy, setStrategy] = useState(null);
  const [stratLoaded, setStratLoaded] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [currentIntake, setCurrentIntake] = useState(null);

  useEffect(() => {
    apiFetch(`/strategy?workspace_id=${ws.id}`).then(data => {
      if (data && Object.keys(data).length > 0) setStrategy(data);
      setStratLoaded(true);
    });
    apiFetch(`/intake?workspace_id=${ws.id}`).then(data => {
      if (data && Object.keys(data).length > 0) setCurrentIntake(data);
    });
  }, [ws.id]);

  const updateStatus = async (newStatus) => {
    const updated = { ...ws, status: newStatus };
    setWs(updated);
    await apiFetch('/workspaces', { method: 'PUT', body: JSON.stringify({ id: ws.id, status: newStatus }) });
  };

  const deleteWorkspace = async () => {
    await apiFetch(`/workspaces?id=${ws.id}`, { method: 'DELETE' });
    onDeleted();
  };

  return (
    <div style={{ padding: '20px 24px', maxWidth: 1100, margin: '0 auto' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20, flexWrap: 'wrap', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
          <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: 6, color: T.textMuted, fontSize: 13, background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'inherit' }}>
            ← Back
          </button>
          <div style={{ fontSize: 20, fontWeight: 800, color: T.text, letterSpacing: '-0.4px' }}>{ws.name}</div>
          <Badge T={T} color={statusColor(ws.status, T)}>{statusLabel(ws.status)}</Badge>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
          <Select T={T} value={ws.status} onChange={e => updateStatus(e.target.value)} options={[
            { value: 'active', label: 'Active' },
            { value: 'strategy_complete', label: 'Strategy Complete' },
            { value: 'pending_intake', label: 'Pending Intake' },
            { value: 'paused', label: 'Paused' },
            { value: 'archived', label: 'Archived' },
          ]} />
          {!confirmDelete ? (
            <Btn T={T} variant="danger" small onClick={() => setConfirmDelete(true)}>Delete</Btn>
          ) : (
            <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
              <span style={{ fontSize: 12, color: T.red }}>Confirm?</span>
              <Btn T={T} variant="danger" small onClick={deleteWorkspace}>Yes, Delete</Btn>
              <Btn T={T} variant="outline" small onClick={() => setConfirmDelete(false)}>Cancel</Btn>
            </div>
          )}
        </div>
      </div>

      {/* Workspace Meta */}
      {(ws.website || ws.client_email || ws.notes) && (
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginBottom: 16, fontSize: 13, color: T.textMuted }}>
          {ws.website && <span>🌐 <a href={ws.website} target="_blank" rel="noopener" style={{ color: T.accent, textDecoration: 'none' }}>{ws.website}</a></span>}
          {ws.client_email && <span>✉ {ws.client_email}</span>}
          {ws.created_at && <span>📅 Created {ws.created_at.slice(0,10)}</span>}
        </div>
      )}

      {/* Tab Bar */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 20 }}>
        {[{ id: 'intake', label: 'Intake Form' }, { id: 'strategy', label: 'Strategy Output' }].map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
            padding: '8px 20px', borderRadius: 8, fontSize: 13, fontWeight: 600,

      {activeTab === 'strategy' && (
        <div>
          <StrategyGenerator T={T} workspaceId={ws.id} intake={currentIntake} onStrategyGenerated={s => {
            setStrategy(s);
            updateStatus('strategy_complete');
          }} />
          {strategy && stratLoaded && (
            <StrategyView T={T} strategy={strategy} workspaceId={ws.id} />
          )}
          {!strategy && stratLoaded && (
            <div style={{ textAlign: 'center', padding: 60, color: T.textMuted, fontSize: 14 }}>
              No strategy generated yet. Fill in the intake form and click "Run Strategy".
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Manage Accounts Modal ────────────────────────────────────────────────────
function ManageAccountsModal({ T, onClose, currentUser }) {
  const [users, setUsers] = useState([]);
  const [workspaces, setWorkspaces] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newEmail, setNewEmail] = useState('');
  const [newName, setNewName] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [newRole, setNewRole] = useState('client');
  const [newWsId, setNewWsId] = useState('');
  const [creating, setCreating] = useState(false);
  const [createError, setCreateError] = useState('');
  const [resetPwdUser, setResetPwdUser] = useState(null);
  const [newPwd, setNewPwd] = useState('');
  const [confirmDeleteUser, setConfirmDeleteUser] = useState(null);

  const load = async () => {
    const [u, w] = await Promise.all([apiFetch('/users'), apiFetch('/workspaces')]);
    if (Array.isArray(u)) setUsers(u);
    if (Array.isArray(w)) setWorkspaces(w);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const createUser = async () => {
    if (!newEmail || !newPassword) return;
    setCreating(true); setCreateError('');
    const res = await apiFetch('/users', {
      method: 'POST',
      body: JSON.stringify({ email: newEmail, password: newPassword, name: newName, role: newRole, workspace_id: newWsId }),
    });
    setCreating(false);
    if (res.error) { setCreateError(res.error); return; }
    setNewEmail(''); setNewName(''); setNewPassword(''); setNewRole('client'); setNewWsId('');
    load();
  };

  const deleteUser = async (uid) => {
    await apiFetch(`/users?id=${uid}`, { method: 'DELETE' });
    setConfirmDeleteUser(null); load();
  };

  const resetPassword = async () => {
    if (!resetPwdUser || !newPwd) return;
    await apiFetch('/users/password', { method: 'POST', body: JSON.stringify({ id: resetPwdUser.id, password: newPwd }) });
    setResetPwdUser(null); setNewPwd('');
  };

  return (
    <ModalOverlay T={T} onClose={onClose}>
      <div style={{ fontSize: 17, fontWeight: 700, color: T.text, marginBottom: 20 }}>Manage Accounts</div>
      {loading ? (
        <div style={{ color: T.textMuted, fontSize: 13, padding: 20, textAlign: 'center' }}>Loading…</div>
      ) : (
        <>
          {/* Create User */}
          <div style={{ marginBottom: 24, padding: 16, background: T.bg, borderRadius: 10 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 12 }}>Create New Account</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 10 }}>
              <Input T={T} value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="Email *" type="email" />
              <Input T={T} value={newName} onChange={e => setNewName(e.target.value)} placeholder="Name" />
              <Input T={T} value={newPassword} onChange={e => setNewPassword(e.target.value)} placeholder="Password *" type="password" />
              <Select T={T} value={newRole} onChange={e => setNewRole(e.target.value)} options={[
                { value: 'client', label: 'Client' }, { value: 'ridge_admin', label: 'Ridge Admin' },
              ]} style={{ width: '100%' }} />
              {newRole === 'client' && (
                <Select T={T} value={newWsId} onChange={e => setNewWsId(e.target.value)} options={[
                  { value: '', label: 'No workspace' },
                  ...workspaces.map(w => ({ value: w.id, label: w.name })),
                ]} style={{ width: '100%' }} />
              )}
            </div>
            {createError && <div style={{ fontSize: 12, color: T.red, marginBottom: 8 }}>{createError}</div>}
            <Btn T={T} small onClick={createUser} disabled={creating || !newEmail || !newPassword}>
              {creating ? 'Creating…' : '+ Create Account'}
            </Btn>
          </div>

          {/* Users Table */}
          <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 10 }}>All Accounts ({users.length})</div>
          <div style={{ maxHeight: 320, overflowY: 'auto' }}>
            {users.map(u => (
              <div key={u.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 0', borderBottom: `1px solid ${T.border}`, gap: 8, flexWrap: 'wrap' }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{u.name || u.email}</div>
                  <div style={{ fontSize: 12, color: T.textMuted }}>{u.email} · <Badge T={T} color={u.role === 'ridge_admin' ? 'green' : 'orange'}>{u.role}</Badge></div>
                </div>
                <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                  {resetPwdUser?.id === u.id ? (
                    <div style={{ display: 'flex', gap: 6 }}>
                      <Input T={T} value={newPwd} onChange={e => setNewPwd(e.target.value)} placeholder="New password" type="password" style={{ width: 140 }} />
                      <Btn T={T} small onClick={resetPassword} disabled={!newPwd}>Save</Btn>
                      <Btn T={T} variant="outline" small onClick={() => setResetPwdUser(null)}>✕</Btn>
                    </div>
                  ) : (
                    <Btn T={T} variant="outline" small onClick={() => setResetPwdUser(u)}>Reset Password</Btn>
                  )}
                  {confirmDeleteUser === u.id ? (
                    <div style={{ display: 'flex', gap: 4 }}>
                      <Btn T={T} variant="danger" small onClick={() => deleteUser(u.id)}>Confirm</Btn>
                      <Btn T={T} variant="outline" small onClick={() => setConfirmDeleteUser(null)}>✕</Btn>
                    </div>
                  ) : (
                    u.id !== currentUser?.id && (
                      <Btn T={T} variant="danger" small onClick={() => setConfirmDeleteUser(u.id)}>Delete</Btn>
                    )
                  )}
                </div>
              </div>
            ))}
          </div>
        </>
      )}
      <div style={{ marginTop: 20, display: 'flex', justifyContent: 'flex-end' }}>
        <Btn T={T} variant="outline" onClick={onClose}>Close</Btn>
      </div>
    </ModalOverlay>
  );
}

// ─── Client Portal ────────────────────────────────────────────────────────────
function ClientPortal({ T, user, workspaceId }) {
  const [ws, setWs] = useState(null);
  const [strategy, setStrategy] = useState(null);
  const [activeView, setActiveView] = useState('overview');

  useEffect(() => {
    apiFetch('/workspaces').then(data => {
      if (Array.isArray(data)) {
        const found = data.find(w => w.id === workspaceId) || data[0];
        setWs(found);
      }
    });
    apiFetch(`/strategy?workspace_id=${workspaceId}`).then(data => {
      if (data && Object.keys(data).length > 0) setStrategy(data);
    });
  }, [workspaceId]);

  if (!ws) return <div style={{ padding: 40, textAlign: 'center', color: T.textMuted }}>Loading workspace…</div>;

  return (
    <div style={{ maxWidth: 1000, margin: '0 auto', padding: '24px 24px' }}>
      {/* View Tabs */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 24 }}>
        {[{ id: 'overview', label: '📊 Overview' }, { id: 'intake', label: '📋 Intake' }, { id: 'strategy', label: '🎯 Strategy' }].map(v => (
          <button key={v.id} onClick={() => setActiveView(v.id)} style={{
            padding: '8px 20px', borderRadius: 8, fontSize: 13, fontWeight: 600,
            background: activeView === v.id ? T.accent : T.bgCard,
            color: activeView === v.id ? '#fff' : T.textMuted,
            border: activeView === v.id ? 'none' : `1px solid ${T.border}`,
            cursor: 'pointer',
          }}>{v.label}</button>
        ))}
      </div>

      {activeView === 'overview' && (
        <div>
          <Card T={T} style={{ padding: 28, marginBottom: 20 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12 }}>
              <div>
                <div style={{ fontSize: 22, fontWeight: 800, color: T.text, letterSpacing: '-0.4px', marginBottom: 6 }}>{ws.name}</div>
                {ws.website && <div style={{ fontSize: 13, color: T.textMuted, marginBottom: 12 }}>{ws.website}</div>}
                <Badge T={T} color={statusColor(ws.status, T)}>{statusLabel(ws.status)}</Badge>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                <div style={{ textAlign: 'center', padding: '12px 20px', background: T.bg, borderRadius: 10 }}>
                  <div style={{ fontSize: 24, fontWeight: 800, color: T.accent }}>{ws.intake_count || 0}</div>
                  <div style={{ fontSize: 12, color: T.textMuted }}>Intake Saves</div>
                </div>
                <div style={{ textAlign: 'center', padding: '12px 20px', background: T.bg, borderRadius: 10 }}>
                  <div style={{ fontSize: 24, fontWeight: 800, color: T.accent }}>{ws.runs_count || 0}</div>
                  <div style={{ fontSize: 12, color: T.textMuted }}>Strategy Runs</div>
                </div>
              </div>
            </div>
          </Card>
          {ws.notes && (
            <Card T={T} style={{ padding: 20 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Notes</div>
              <div style={{ fontSize: 13, color: T.text, lineHeight: 1.7 }}>{ws.notes}</div>
            </Card>
          )}
        </div>
      )}

      {activeView === 'intake' && (
        <IntakeForm T={T} workspaceId={ws.id} />
      )}

      {activeView === 'strategy' && (
        <div>
          {strategy ? (
            <StrategyView T={T} strategy={strategy} workspaceId={ws.id} />
          ) : (
            <div style={{ textAlign: 'center', padding: 80, color: T.textMuted }}>
              <div style={{ fontSize: 40, marginBottom: 16 }}>⏳</div>
              <div style={{ fontSize: 16, fontWeight: 600, color: T.text, marginBottom: 8 }}>Strategy not yet generated</div>
              <div style={{ fontSize: 13 }}>Your Ridge team will generate your strategy once the intake form is complete.</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Admin Dashboard ──────────────────────────────────────────────────────────
function AdminDashboard({ T, user, onLogout, mode, toggle }) {
  const [view, setView] = useState('workspaces');
  const [selectedWs, setSelectedWs] = useState(null);
  const [showManageAccounts, setShowManageAccounts] = useState(false);

  const wsName = selectedWs?.name;

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: T.bg, overflow: 'hidden' }}>
      <TopBar T={T} mode={mode} toggle={toggle} user={user} onLogout={onLogout}
        onManageAccounts={() => setShowManageAccounts(true)}
        view={view} onViewChange={setView} wsName={wsName} />
      <div style={{ flex: 1, overflowY: 'auto' }}>
        {selectedWs ? (
          <WorkspaceDetail T={T} workspace={selectedWs} user={user}
            onBack={() => setSelectedWs(null)}
            onDeleted={() => { setSelectedWs(null); showToast('Workspace deleted'); }} />
        ) : (
          <WorkspacesView T={T} onSelect={ws => setSelectedWs(ws)} />
        )}
      </div>
      {showManageAccounts && (
        <ManageAccountsModal T={T} currentUser={user} onClose={() => setShowManageAccounts(false)} />
      )}
      <ToastContainer T={T} />
    </div>
  );
}

// ─── Client Dashboard ─────────────────────────────────────────────────────────
function ClientDashboard({ T, user, onLogout, mode, toggle }) {
  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: T.bg, overflow: 'hidden' }}>
      <div style={{
        height: 56, background: T.topBar, borderBottom: `1px solid ${T.border}`,
        display: 'flex', alignItems: 'center', padding: '0 20px', gap: 16, flexShrink: 0,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <RidgeLogo T={T} size={24} />
        </div>
        <div style={{ flex: 1 }} />
        <ThemeToggle T={T} mode={mode} toggle={toggle} />
        <span style={{ fontSize: 13, fontWeight: 500, color: T.textMuted }}>{user?.name || user?.email}</span>
        <button onClick={onLogout} style={{ fontSize: 12, color: T.textMuted, background: 'none', border: 'none', cursor: 'pointer', padding: '4px 8px', borderRadius: 6 }}>Sign out</button>
      </div>
      <div style={{ flex: 1, overflowY: 'auto' }}>
        <ClientPortal T={T} user={user} workspaceId={user.workspace_id} />
      </div>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const { T, mode, toggle, setMode } = useTheme();
  const [user, setUser] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);

  // Session check on load
  useEffect(() => {
    const urlParams = new URLSearchParams(window.location.search);
    const tokenFromUrl = urlParams.get('token');
    if (tokenFromUrl) SESSION_TOKEN = tokenFromUrl;

    // Try session check — short timeout so we don't hang on loading screen
    const timeout = setTimeout(() => setAuthChecked(true), 4000);
    apiFetch('/auth/session').then(data => {
      clearTimeout(timeout);
      if (data?.user) {
        setUser(data.user);
      }
      // Load theme from server
      apiFetch('/settings?key=theme').then(d => {
        if (d?.value === 'dark' || d?.value === 'light') setMode(d.value);
      });
      setAuthChecked(true);
    }).catch(() => { clearTimeout(timeout); setAuthChecked(true); });
  }, []);

  const handleLogin = (userData, token) => {
    SESSION_TOKEN = token;
    setUser(userData);
    // Load theme
    apiFetch('/settings?key=theme').then(d => {
      if (d?.value === 'dark' || d?.value === 'light') setMode(d.value);
    });
  };

  const handleLogout = async () => {
    if (SESSION_TOKEN) {
      await apiFetch('/auth/logout', { method: 'POST', body: JSON.stringify({ token: SESSION_TOKEN }) });
    }
    SESSION_TOKEN = null;
    setUser(null);
  };

  if (!authChecked) {
    return (
      <div style={{ height: '100vh', background: T.bg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ textAlign: 'center' }}>
          <RidgeLogo T={T} size={44} />
          <div style={{ fontSize: 14, fontWeight: 600, color: T.textMuted, marginTop: 12, letterSpacing: '0.02em' }}>Strategy Engine</div>
          <div style={{ fontSize: 13, color: T.textMuted, marginTop: 6 }}>Loading…</div>
          <div style={{ marginTop: 24, width: 48, height: 4, borderRadius: 2, background: T.accent, opacity: 0.3, margin: '24px auto 0' }} />
        </div>
      </div>
    );
  }

  if (!user) return <LoginScreen T={T} onLogin={handleLogin} />;

  if (user.role === 'ridge_admin') {
    return <AdminDashboard T={T} user={user} onLogout={handleLogout} mode={mode} toggle={toggle} />;
  }

  return <ClientDashboard T={T} user={user} onLogout={handleLogout} mode={mode} toggle={toggle} />;
}

createRoot(document.getElementById('root')).render(<App />);
</script>
