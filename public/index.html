function timeAgo(dateStr) {
  if (!dateStr) return '';
  const now = new Date();
  let d;
  if (typeof dateStr === 'number') {
    d = new Date(dateStr * 1000);
  } else if (typeof dateStr === 'string' && (dateStr.includes('ago') || dateStr === 'today' || dateStr === 'yesterday')) {
    return dateStr;
  } else {
    d = new Date(dateStr);
  }
  if (isNaN(d.getTime())) return dateStr;
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} hours ago`;
  if (diff < 172800) return 'Yesterday';
  return `${Math.floor(diff / 86400)} days ago`;
}

// ─── Market Pulse Widget ───────────────────────────────────────────────────
function MarketPulse({ T }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [collapsed, setCollapsed] = useState(false);
  const cacheRef = useRef({ data: null, fetchedAt: 0 });

  const fetchPulse = async () => {
    const now = Date.now();
    if (cacheRef.current.data && (now - cacheRef.current.fetchedAt) < 15 * 60 * 1000) {
      setData(cacheRef.current.data);
      return;
    }
    setLoading(true);
    try {
      const res = await fetch(AI_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'market_pulse' }),
      });
      const result = await res.json();
      if (result.ok && result.text) {
        const cleaned = result.text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
        const firstBrace = cleaned.indexOf('{');
        const lastBrace = cleaned.lastIndexOf('}');
        if (firstBrace !== -1) {
          const parsed = JSON.parse(cleaned.substring(firstBrace, lastBrace + 1));
          setData(parsed);
          cacheRef.current = { data: parsed, fetchedAt: now };
        }
      }
    } catch (e) {
      console.error('Market pulse error:', e);
    }
    setLoading(false);
  };

  useEffect(() => { fetchPulse(); }, []);

  const mkChange = (pct) => {
    if (!pct) return null;
    const num = parseFloat(String(pct).replace(/[^0-9.\-]/g, ''));
    const isPos = num >= 0;
    return (
      <span className="mono" style={{ color: isPos ? T.success : T.danger, fontSize: 11, fontWeight: 500 }}>
        {isPos ? '+' : ''}{pct}{typeof pct === 'number' ? '%' : (String(pct).includes('%') ? '' : '%')}
      </span>
    );
  };

  if (collapsed) {
    return (
      <button onClick={() => setCollapsed(false)} style={{
        display: 'flex', alignItems: 'center', gap: 6, padding: '6px 10px',
        background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 6,
        color: T.textMuted, fontSize: 11, cursor: 'pointer', marginBottom: 10,
      }}>
        <Icon name="activity" size={12} color={T.textMuted} />
        <span>Market Pulse</span>
        <Icon name="chevronDown" size={10} color={T.textMuted} />
      </button>
    );
  }

  return (
    <div style={{
      background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 8,
      padding: '8px 14px', marginBottom: 10, display: 'flex', alignItems: 'center',
      gap: 16, flexWrap: 'wrap', fontSize: 12,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <Icon name="activity" size={13} color={T.accentText} />
        <span style={{ fontSize: 10, fontWeight: 600, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Market Pulse</span>
      </div>
      {loading && !data && <span style={{ color: T.textMuted, fontSize: 11 }}>Loading...</span>}
      {data && (
        <>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ color: T.textSecondary }}>S&P 500:</span>
            <span className="mono tabular data-shimmer" style={{ color: T.text, fontWeight: 500 }}>{data.sp500 && data.sp500.price}</span>
            {mkChange(data.sp500 && data.sp500.change_pct)}
          </div>
          <span style={{ color: T.textFaint }}>|</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ color: T.textSecondary }}>NASDAQ:</span>
            <span className="mono tabular data-shimmer" style={{ color: T.text, fontWeight: 500 }}>{data.nasdaq && data.nasdaq.price}</span>
            {mkChange(data.nasdaq && data.nasdaq.change_pct)}
          </div>
          <span style={{ color: T.textFaint }}>|</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ color: T.textSecondary }}>10Y:</span>
            <span className="mono tabular" style={{ color: T.text, fontWeight: 500 }}>{data.ten_year_yield}</span>
          </div>
          <span style={{ color: T.textFaint }}>|</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ color: T.textSecondary }}>VIX:</span>
            <span className="mono tabular" style={{ color: T.text, fontWeight: 500 }}>{data.vix}</span>
          </div>
        </>
      )}
      <div style={{ marginLeft: 'auto', display: 'flex', gap: 6, alignItems: 'center' }}>
        <button onClick={fetchPulse} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 2 }}>
          <Icon name="refreshCw" size={11} color={T.textMuted} style={loading ? { animation: 'spin 1s linear infinite' } : {}} />
        </button>
        <button onClick={() => setCollapsed(true)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 2 }}>
          <Icon name="x" size={11} color={T.textMuted} />
        </button>
      </div>
    </div>
  );
}

// ─── Signal Card ──────────────────────────────────────────────────────────────────────
function SignalCard({ T, signal, onDraft, onDismiss, draft, draftLoading }) {
  const [expanded, setExpanded] = useState(false);
  const [showDraft, setShowDraft] = useState(!!draft);
  const urgency = URGENCY_CONFIG[signal.urgency] || URGENCY_CONFIG.monitor;
  const sigType = SIGNAL_TYPES[signal.signal_type] || { label: signal.signal_type, color: '#8B919A' };

  useEffect(() => { if (draft) setShowDraft(true); }, [draft]);

  return (
    <div className="fade-slide-in" style={{
      background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 8,
      padding: 14, marginBottom: 8,
      borderLeft: `3px solid ${urgency.color}`,
      transition: 'border-color 150ms ease',
    }}>
      {/* Header row */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>
        <span style={{ width: 7, height: 7, borderRadius: '50%', background: urgency.color, flexShrink: 0, animation: signal.urgency === 'immediate' ? 'pulseRing 2s ease infinite' : 'none' }} />
        <span style={{ fontSize: 10, fontWeight: 600, color: urgency.color, textTransform: 'uppercase', letterSpacing: '0.5px' }}>{urgency.label}</span>
        <span style={{ fontSize: 11, color: T.textMuted }}>{timeAgo(signal.date)}</span>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 6, alignItems: 'center' }}>
          <span className="mono tabular" style={{ fontSize: 11, color: T.accentText, fontWeight: 500 }}>{signal.relevance_score}/100</span>
        </div>
      </div>

      {/* Headline */}
      <div style={{ fontSize: 14, fontWeight: 600, color: T.text, marginBottom: 6, lineHeight: 1.4 }}>
        {signal.headline}
        {signal.url && (
          <a href={signal.url} target="_blank" rel="noopener noreferrer" style={{ marginLeft: 6, display: 'inline-flex', verticalAlign: 'middle' }}>
            <Icon name="externalLink" size={12} color={T.textMuted} />
          </a>
        )}
      </div>

      {/* Source + type */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>
        <span style={{ fontSize: 11, color: T.textMuted }}>Source: {signal.source}</span>
        <span style={{
          fontSize: 10, fontWeight: 500, color: sigType.color,
          background: `${sigType.color}18`, padding: '2px 8px', borderRadius: 4,
          textTransform: 'uppercase', letterSpacing: '0.3px',
        }}>{sigType.label}</span>
      </div>

      {/* AI Summary */}
      <div style={{ fontSize: 12, color: T.textSecondary, lineHeight: 1.6, fontStyle: 'italic',
        borderLeft: `2px solid ${T.accentText}`, paddingLeft: 10, marginBottom: 10 }}>
        "{signal.summary}"
      </div>

      {/* Companies mentioned */}
      {signal.companies_mentioned && signal.companies_mentioned.length > 0 && (
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 10 }}>
          {signal.companies_mentioned.map((c, i) => (
            <span key={i} style={{
              fontSize: 10, color: T.textMuted, background: T.bgInput,
              padding: '2px 7px', borderRadius: 3, border: `1px solid ${T.border}`,
            }}>{c}</span>
          ))}
        </div>
      )}

      {/* Actions */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        <Btn T={T} small onClick={() => { if (!draft) onDraft(signal); setShowDraft(true); }}
          disabled={draftLoading}>
          <Icon name="send" size={11} /> {draftLoading ? 'Drafting...' : 'Draft Outreach'}
        </Btn>
        <Btn T={T} variant="outline" small onClick={() => setExpanded(!expanded)}>
          <Icon name={expanded ? 'chevronUp' : 'chevronDown'} size={11} /> {expanded ? 'Collapse' : 'Expand'}
        </Btn>
        <Btn T={T} variant="outline" small onClick={() => onDismiss(signal)}>
          <Icon name="x" size={11} /> Dismiss
        </Btn>
      </div>

      {/* Expanded detail */}
      {expanded && (
        <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${T.border}`, fontSize: 12, color: T.textSecondary, lineHeight: 1.6 }}>
          <div style={{ marginBottom: 4 }}><strong style={{ color: T.text }}>Type:</strong> {sigType.label}</div>
          <div style={{ marginBottom: 4 }}><strong style={{ color: T.text }}>Urgency:</strong> {urgency.label}</div>
          <div style={{ marginBottom: 4 }}><strong style={{ color: T.text }}>Relevance:</strong> <span className="mono">{signal.relevance_score}/100</span></div>
          {signal.url && <div><strong style={{ color: T.text }}>URL:</strong> <a href={signal.url} target="_blank" rel="noopener noreferrer" style={{ color: T.accentText }}>{signal.url}</a></div>}
        </div>
      )}

      {/* Draft Outreach panel */}
      {showDraft && draft && (
        <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${T.border}` }}>
          <div style={{ fontSize: 10, fontWeight: 600, color: T.accentText, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 10 }}>
            Draft Outreach
          </div>
          {[
            { label: 'Connection Note', value: draft.connection_note },
            { label: 'LinkedIn Message', value: draft.linkedin_message },
            { label: 'Email Subject', value: draft.email_subject },
            { label: 'Email Body', value: draft.email_body },
          ].map((item, i) => item.value && (
            <div key={i} style={{ marginBottom: 10 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                <span style={{ fontSize: 10, fontWeight: 500, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.3px' }}>{item.label}</span>
                <CopyBtn T={T} text={item.value} />
              </div>
              <div style={{
                background: T.bgInput, border: `1px solid ${T.border}`, borderRadius: 6,
                padding: '8px 12px', fontSize: 12, color: T.text, lineHeight: 1.6, whiteSpace: 'pre-wrap',
              }}>{item.value}</div>
            </div>
          ))}
          {draft.suggested_target_title && (
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', fontSize: 11 }}>
              <Icon name="target" size={12} color={T.accentText} />
              <span style={{ color: T.textMuted }}>Target:</span>
              <span style={{ color: T.text, fontWeight: 500 }}>{draft.suggested_target_title}</span>
            </div>
          )}
          {draft.timing_note && (
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', fontSize: 11, marginTop: 4 }}>
              <Icon name="clock" size={12} color={T.accentText} />
              <span style={{ color: T.textMuted }}>Timing:</span>
              <span style={{ color: T.text }}>{draft.timing_note}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Intelligence Feed ───────────────────────────────────────────────────────────────
function IntelligenceFeed({ T, workspaceId, intake, strategy }) {
  const [signals, setSignals] = useState([]);
  const [dismissed, setDismissed] = useState([]);
  const [drafts, setDrafts] = useState({});
  const [draftLoading, setDraftLoading] = useState({});
  const [lastScanAt, setLastScanAt] = useState(0);
  const [scanCount, setScanCount] = useState(0);
  const [scanning, setScanning] = useState(false);
  const [scanProgress, setScanProgress] = useState({ current: 0, total: 0, query: '' });
  const [typeFilters, setTypeFilters] = useState(['all']);
  const [timeFilter, setTimeFilter] = useState('live');
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    apiFetch(`/intelligence?workspace_id=${workspaceId}`).then(data => {
      if (data.signals) setSignals(data.signals);
      if (data.dismissed) setDismissed(data.dismissed);
      if (data.drafts) setDrafts(data.drafts);
      if (data.last_scan_at) setLastScanAt(data.last_scan_at);
      if (data.scan_count) setScanCount(data.scan_count);
      setLoaded(true);
    });
  }, [workspaceId]);

  const saveData = (sigs, dis, dra, scanAt, count) => {
    apiFetch('/intelligence', {
      method: 'POST',
      body: JSON.stringify({
        workspace_id: workspaceId,
        signals: sigs,
        dismissed: dis,
        drafts: dra,
        last_scan_at: scanAt,
        scan_count: count,
      }),
    });
  };

  const buildQueries = () => {
    const industry = intake && intake.company && intake.company.industry ? intake.company.industry : '';
    const geo = intake && intake.icp && intake.icp.geographies ? intake.icp.geographies : 'US';
    const companyName = intake && intake.company && intake.company.name ? intake.company.name : '';
    const titleClusters = strategy && strategy.targeting && strategy.targeting.title_clusters ? strategy.targeting.title_clusters : [];
    const titles = titleClusters.length > 0 ? titleClusters.map(c => c.titles).flat() : ['VP of Sales'];

    const queries = [];
    if (industry) {
      queries.push(`${industry} funding round 2025 2026`);
      queries.push(`${industry} VP Sales CRO new hire leadership change`);
      queries.push(`${industry} hiring SDR sales team expansion`);
      queries.push(`${industry} acquisition merger partnership`);
      queries.push(`${industry} layoffs restructuring`);
      queries.push(`${industry} new product launch SaaS platform`);
      queries.push(`${industry} regulation compliance changes 2026`);
      queries.push(`${industry} ${geo} market growth revenue`);
    }
    if (companyName) {
      queries.push(`${companyName} competitors news recent`);
    }
    if (industry && titles[0]) {
      queries.push(`${industry} ${titles[0]} linkedin post`);
    }
    return queries.length > 0 ? queries : ['B2B SaaS sales intelligence news 2026'];
  };

  const buildContext = () => {
    const companyName = intake && intake.company ? intake.company.name : 'Unknown';
    const industry = intake && intake.company ? intake.company.industry : 'Unknown';
    const icpDesc = intake && intake.icp ? intake.icp.description : 'B2B companies';
    const offerDesc = intake && intake.offer ? intake.offer.description : 'B2B service';
    const titleClusters = strategy && strategy.targeting && strategy.targeting.title_clusters ? strategy.targeting.title_clusters : [];
    const targetTitles = titleClusters.length > 0 ? titleClusters.map(c => c.titles).flat().slice(0, 5).join(', ') : 'VP, Director, C-Suite';
    const geo = intake && intake.icp ? intake.icp.geographies : 'US';
    return `Client context for relevance scoring:\n- Company: ${companyName}\n- Industry: ${industry}\n- ICP: ${icpDesc}\n- Offer: ${offerDesc}\n- Target titles: ${targetTitles}\n- Geographies: ${geo}\n\nFind signals relevant to selling to this client's target market.`;
  };

  const runScan = async () => {
    setScanning(true);
    const queries = buildQueries();
    const context = buildContext();
    const allSignals = [];
    setScanProgress({ current: 0, total: queries.length, query: '' });

    for (let i = 0; i < queries.length; i += 3) {
      const batch = queries.slice(i, i + 3);
      setScanProgress({ current: i, total: queries.length, query: batch[0] });
      const results = await Promise.all(
        batch.map(async (q) => {
          try {
            const res = await fetch(AI_API, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'scan_intelligence', query: q, context }),
            });
            const result = await res.json();
            if (result.ok && result.text) {
              const cleaned = result.text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
              const first = cleaned.indexOf('[');
              const last = cleaned.lastIndexOf(']');
              if (first !== -1) return JSON.parse(cleaned.substring(first, last + 1));
            }
          } catch (e) { console.error('Scan error:', q, e); }
          return [];
        })
      );
      allSignals.push(...results.flat());
    }

    setScanProgress({ current: queries.length, total: queries.length, query: 'Processing results...' });

    const seen = new Set();
    const unique = allSignals.filter(s => {
      if (!s || !s.headline) return false;
      const key = s.headline.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 50);
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
    unique.forEach((s, i) => { if (!s.id) s.id = `sig_${Date.now()}_${i}`; });
    unique.sort((a, b) => (b.relevance_score || 0) - (a.relevance_score || 0));

    const existingIds = new Set(signals.map(s => s.headline ? s.headline.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 50) : ''));
    const newOnly = unique.filter(s => !existingIds.has(s.headline ? s.headline.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 50) : ''));
    const merged = [...newOnly, ...signals];
    const newScanAt = Date.now() / 1000;
    const newCount = scanCount + 1;

    setSignals(merged); setLastScanAt(newScanAt); setScanCount(newCount); setScanning(false);
    saveData(merged, dismissed, drafts, newScanAt, newCount);
    if (newOnly.length > 0) showToast(`Found ${newOnly.length} new signals`);
    else showToast('Scan complete — no new signals found');
  };

  const handleDraft = async (signal) => {
    const sigId = signal.id || signal.headline;
    setDraftLoading(prev => ({ ...prev, [sigId]: true }));
    try {
      const offerDesc = intake && intake.offer ? intake.offer.description : '';
      const valueProp = intake && intake.value_props ? intake.value_props.primary : '';
      const angleNames = strategy && strategy.messaging_angles && strategy.messaging_angles.angles && strategy.messaging_angles.angles.length > 0 ? strategy.messaging_angles.angles[0].name : 'Observation-led';
      const toneRules = strategy && strategy.conversation_flow ? strategy.conversation_flow.tone_rules : 'Professional, observational';
      const signalData = `SIGNAL: ${signal.headline}\nDETAILS: ${signal.summary}\nCOMPANIES: ${(signal.companies_mentioned || []).join(', ')}\nSIGNAL TYPE: ${signal.signal_type}`;
      const contextData = `- Offer: ${offerDesc}\n- Value prop: ${valueProp}\n- Best messaging angle: ${angleNames}\n- Tone: ${toneRules}`;
      const res = await fetch(AI_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'draft_outreach', signal: signalData, context: contextData }),
      });
      const result = await res.json();
      if (result.ok && result.text) {
        const cleaned = result.text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
        const firstBrace = cleaned.indexOf('{');
        const lastBrace = cleaned.lastIndexOf('}');
        if (firstBrace !== -1) {
          const parsed = JSON.parse(cleaned.substring(firstBrace, lastBrace + 1));
          const newDrafts = { ...drafts, [sigId]: parsed };
          setDrafts(newDrafts);
          saveData(signals, dismissed, newDrafts, lastScanAt, scanCount);
          showToast('Outreach draft generated');
        }
      }
    } catch (e) { console.error('Draft error:', e); showToast('Failed to generate draft'); }
    setDraftLoading(prev => ({ ...prev, [sigId]: false }));
  };

  const handleDismiss = (signal) => {
    const sigId = signal.id || signal.headline;
    const newDismissed = [...dismissed, sigId];
    setDismissed(newDismissed);
    saveData(signals, newDismissed, drafts, lastScanAt, scanCount);
  };

  const filteredSignals = useMemo(() => {
    return signals.filter(s => {
      const sigId = s.id || s.headline;
      if (dismissed.includes(sigId)) return false;
      if (!typeFilters.includes('all') && !typeFilters.includes(s.signal_type)) return false;
      return true;
    });
  }, [signals, dismissed, typeFilters, timeFilter]);

  const stats = useMemo(() => {
    const active = signals.filter(s => !dismissed.includes(s.id || s.headline));
    return {
      total: active.length,
      highPriority: active.filter(s => s.urgency === 'immediate').length,
      accounts: new Set(active.flatMap(s => s.companies_mentioned || [])).size,
      draftsCreated: Object.keys(drafts).length,
    };
  }, [signals, dismissed, drafts]);

  const toggleTypeFilter = (id) => {
    if (id === 'all') {
      setTypeFilters(['all']);
    } else {
      setTypeFilters(prev => {
        const without = prev.filter(f => f !== 'all');
        if (without.includes(id)) {
          const next = without.filter(f => f !== id);
          return next.length === 0 ? ['all'] : next;
        }
        return [...without, id];
      });
    }
  };

  return (
    <div>
      <MarketPulse T={T} />
      <div style={{
        background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 8,
        padding: '10px 14px', marginBottom: 10, display: 'flex', gap: 20, flexWrap: 'wrap', alignItems: 'center',
      }}>
        {[
          { label: 'SIGNALS', value: stats.total, icon: 'radar' },
          { label: 'HIGH PRIORITY', value: stats.highPriority, icon: 'zap', color: stats.highPriority > 0 ? T.danger : undefined },
          { label: 'ACCOUNTS', value: stats.accounts, icon: 'target' },
          { label: 'DRAFTS', value: stats.draftsCreated, icon: 'send' },
        ].map((stat, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <Icon name={stat.icon} size={13} color={stat.color || T.textMuted} />
            <span style={{ fontSize: 10, fontWeight: 500, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.5px' }}>{stat.label}:</span>
            <span className="mono tabular data-shimmer" style={{ fontSize: 13, fontWeight: 600, color: stat.color || T.text }}>{stat.value}</span>
          </div>
        ))}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
          {lastScanAt > 0 && (
            <span style={{ fontSize: 10, color: T.textMuted }}>Last scan: {timeAgo(lastScanAt)}</span>
          )}
          <Btn T={T} small onClick={runScan} disabled={scanning}>
            <Icon name="refreshCw" size={11} style={scanning ? { animation: 'spin 1s linear infinite' } : {}} />
            {scanning ? 'Scanning...' : 'Scan Now'}
          </Btn>
        </div>
      </div>

      {scanning && (
        <div style={{
          background: T.accentSurface, border: `1px solid ${T.accentBorder}`, borderRadius: 8,
          padding: '10px 14px', marginBottom: 10,
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
            <span style={{ fontSize: 11, color: T.accentText, fontWeight: 500 }}>
              Scanning queries... {scanProgress.current}/{scanProgress.total}
            </span>
            <span className="mono" style={{ fontSize: 11, color: T.textMuted }}>
              {Math.round((scanProgress.current / Math.max(scanProgress.total, 1)) * 100)}%
            </span>
          </div>
          <div style={{ height: 3, background: T.bgInput, borderRadius: 2, overflow: 'hidden' }}>
            <div style={{
              height: '100%', background: T.accentText, borderRadius: 2,
              width: `${(scanProgress.current / Math.max(scanProgress.total, 1)) * 100}%`,
              transition: 'width 300ms ease',
            }} />
          </div>
          {scanProgress.query && (
            <div style={{ fontSize: 10, color: T.textMuted, marginTop: 4, fontStyle: 'italic' }}>{scanProgress.query}</div>
          )}
        </div>
      )}

      <div style={{ display: 'flex', gap: 6, marginBottom: 10, flexWrap: 'wrap', alignItems: 'center' }}>
        <Icon name="filter" size={12} color={T.textMuted} style={{ marginRight: 2 }} />
        {TYPE_FILTERS_INTEL.map(f => (
          <button key={f.id} onClick={() => toggleTypeFilter(f.id)} style={{
            fontSize: 11, padding: '3px 10px', borderRadius: 4,
            background: typeFilters.includes(f.id) ? T.accentSurface : T.bgInput,
            border: `1px solid ${typeFilters.includes(f.id) ? T.accentBorder : T.border}`,
            color: typeFilters.includes(f.id) ? T.accentText : T.textMuted,
            cursor: 'pointer', transition: 'all 150ms ease', fontFamily: 'inherit',
          }}>{f.label}</button>
        ))}
        <span style={{ width: 1, height: 16, background: T.border, margin: '0 4px' }} />
        {TIME_FILTERS_INTEL.map(f => (
          <button key={f.id} onClick={() => setTimeFilter(f.id)} style={{
            fontSize: 11, padding: '3px 10px', borderRadius: 4,
            background: timeFilter === f.id ? T.accentSurface : T.bgInput,
            border: `1px solid ${timeFilter === f.id ? T.accentBorder : T.border}`,
            color: timeFilter === f.id ? T.accentText : T.textMuted,
            cursor: 'pointer', transition: 'all 150ms ease', fontFamily: 'inherit',
          }}>{f.label}</button>
        ))}
      </div>

      {!loaded ? (
        <div>
          {[1,2,3].map(i => (
            <div key={i} className="skeleton" style={{ height: 120, borderRadius: 8, marginBottom: 8 }} />
          ))}
        </div>
      ) : filteredSignals.length === 0 ? (
        <div style={{
          background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 8,
          padding: 40, textAlign: 'center',
        }}>
          <Icon name="radar" size={32} color={T.textFaint} style={{ marginBottom: 12 }} />
          <div style={{ fontSize: 14, fontWeight: 500, color: T.textSecondary, marginBottom: 6 }}>
            {signals.length === 0 ? 'No signals yet' : 'No signals match filters'}
          </div>
          <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 14 }}>
            {signals.length === 0 ? 'Click "Scan Now" to search for buying signals, market news, and opportunities relevant to this client.' : 'Try adjusting your filters or run a new scan.'}
          </div>
          {signals.length === 0 && (
            <Btn T={T} onClick={runScan} disabled={scanning}>
              <Icon name="radar" size={12} /> {scanning ? 'Scanning...' : 'Run First Scan'}
            </Btn>
          )}
        </div>
      ) : (
        filteredSignals.map((signal, i) => (
          <SignalCard
            key={signal.id || i}
            T={T}
            signal={signal}
            onDraft={handleDraft}
            onDismiss={handleDismiss}
            draft={drafts[signal.id || signal.headline]}
            draftLoading={draftLoading[signal.id || signal.headline]}
          />
        ))
      )}
    </div>
  );
}

// ─── Workspace Detail ─────────────────────────────────────────────────────────
function WorkspaceDetail({ T, workspace, onBack, onDeleted, user, activeInnerTab, onInnerTabChange }) {
  const [ws, setWs] = useState(workspace);
  const [strategy, setStrategy] = useState(null);
  const [stratLoaded, setStratLoaded] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [currentIntake, setCurrentIntake] = useState(null);

  useEffect(() => {
    apiFetch(`/strategy?workspace_id=${ws.id}`).then(data => {
      if (data && Object.keys(data).length > 0) setStrategy(data);
      setStratLoaded(true);
    });
    apiFetch(`/intake?workspace_id=${ws.id}`).then(data => {
      if (data && Object.keys(data).length > 0) setCurrentIntake(data);
    });
  }, [ws.id]);

  const updateStatus = async (newStatus) => {
    const updated = { ...ws, status: newStatus };
    setWs(updated);
    await apiFetch('/workspaces', { method: 'PUT', body: JSON.stringify({ id: ws.id, status: newStatus }) });
  };

  const deleteWorkspace = async () => {
    await apiFetch(`/workspaces?id=${ws.id}`, { method: 'DELETE' });
    onDeleted();
  };

  const activeTab = activeInnerTab || 'intake';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <HeaderBar T={T}
        breadcrumbs={[
          { label: 'Workspaces', onClick: onBack },
          { label: ws.name },
        ]}
        actions={
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            {(ws.website || ws.client_email) && (
              <div style={{ display: 'flex', gap: 10, fontSize: 12, color: T.textMuted, alignItems: 'center' }}>
                {ws.website && (
                  <a href={ws.website} target="_blank" rel="noopener" style={{ color: T.accentText, textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 4 }}>
                    <Icon name="globe" size={12} color={T.accentText} /> {ws.website}
                  </a>
                )}
                {ws.client_email && (
                  <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                    <Icon name="mail" size={12} /> {ws.client_email}
                  </span>
                )}
              </div>
            )}
            <Badge T={T} color={statusColor(ws.status)}>{statusLabel(ws.status)}</Badge>
            <Select T={T} value={ws.status} onChange={e => updateStatus(e.target.value)} options={[
              { value: 'active', label: 'Active' },
              { value: 'strategy_complete', label: 'Strategy Complete' },
              { value: 'pending_intake', label: 'Pending Intake' },
              { value: 'paused', label: 'Paused' },
              { value: 'archived', label: 'Archived' },
            ]} style={{ height: 28, fontSize: 12 }} />
            {!confirmDelete ? (
              <Btn T={T} variant="danger" small onClick={() => setConfirmDelete(true)}>Delete</Btn>
            ) : (
              <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                <span style={{ fontSize: 11, color: T.danger }}>Confirm?</span>
                <Btn T={T} variant="danger" small onClick={deleteWorkspace}>Yes</Btn>
                <Btn T={T} variant="outline" small onClick={() => setConfirmDelete(false)}>Cancel</Btn>
              </div>
            )}
          </div>
        }
      />

      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 20px' }}>
        {activeTab === 'intake' && (
          <IntakeForm T={T} workspaceId={ws.id} onIntakeChange={setCurrentIntake} />
        )}

        {activeTab === 'strategy' && (
          <div>
            <StrategyGenerator T={T} workspaceId={ws.id} intake={currentIntake} onStrategyGenerated={s => {
              setStrategy(s);
              updateStatus('strategy_complete');
            }} />
            {strategy && stratLoaded && (
              <StrategyView T={T} strategy={strategy} workspaceId={ws.id} />
            )}
            {!strategy && stratLoaded && (
              <div style={{ textAlign: 'center', padding: '60px 20px' }}>
                <Icon name="barChart" size={40} color={T.textMuted} style={{ display: 'block', margin: '0 auto 14px' }} />
                <div style={{ fontSize: 14, fontWeight: 600, color: T.text, marginBottom: 6 }}>No strategy yet</div>
                <div style={{ fontSize: 13, color: T.textMuted, lineHeight: 1.6 }}>Fill in the intake form and click "Run Strategy" above.</div>
              </div>
            )}
          </div>
        )}

        {activeTab === 'intelligence' && (
          <IntelligenceFeed T={T} workspaceId={ws.id} intake={currentIntake} strategy={strategy} />
        )}
      </div>
    </div>
  );
}

// ─── Manage Accounts ──────────────────────────────────────────────────────────
function ManageAccountsView({ T, currentUser, breadcrumbs, collapsed, onToggleSidebar }) {
  const [users, setUsers] = useState([]);
  const [workspaces, setWorkspaces] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newEmail, setNewEmail] = useState('');
  const [newName, setNewName] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [newRole, setNewRole] = useState('client');
  const [newWsId, setNewWsId] = useState('');
  const [creating, setCreating] = useState(false);
  const [createError, setCreateError] = useState('');
  const [resetPwdUser, setResetPwdUser] = useState(null);
  const [newPwd, setNewPwd] = useState('');
  const [confirmDeleteUser, setConfirmDeleteUser] = useState(null);

  const load = async () => {
    const [u, w] = await Promise.all([apiFetch('/users'), apiFetch('/workspaces')]);
    if (Array.isArray(u)) setUsers(u);
    if (Array.isArray(w)) setWorkspaces(w);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const createUser = async () => {
    if (!newEmail || !newPassword) return;
    setCreating(true); setCreateError('');
    const res = await apiFetch('/users', {
      method: 'POST',
      body: JSON.stringify({ email: newEmail, password: newPassword, name: newName, role: newRole, workspace_id: newWsId }),
    });
    setCreating(false);
    if (res.error) { setCreateError(res.error); return; }
    setNewEmail(''); setNewName(''); setNewPassword(''); setNewRole('client'); setNewWsId('');
    load();
  };

  const deleteUser = async (uid) => {
    await apiFetch(`/users?id=${uid}`, { method: 'DELETE' });
    setConfirmDeleteUser(null); load();
  };

  const resetPassword = async () => {
    if (!resetPwdUser || !newPwd) return;
    await apiFetch('/users/password', { method: 'POST', body: JSON.stringify({ id: resetPwdUser.id, password: newPwd }) });
    setResetPwdUser(null); setNewPwd('');
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <HeaderBar T={T} breadcrumbs={breadcrumbs} collapsed={collapsed} onToggleSidebar={onToggleSidebar} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 24px', maxWidth: 800 }}>
        {loading ? (
          <div style={{ padding: 40, textAlign: 'center' }}>
            <Icon name="loader" size={20} color={T.textMuted} style={{ animation: 'spin 1s linear infinite', display: 'block', margin: '0 auto 10px' }} />
            <span style={{ color: T.textMuted, fontSize: 13 }}>Loading…</span>
          </div>
        ) : (
          <>
            {/* Create User */}
            <div style={{ background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 8, padding: 16, marginBottom: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 500, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 12 }}>Create New Account</div>
              <div className="two-col-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 8 }}>
                <Input T={T} value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="Email *" type="email" />
                <Input T={T} value={newName} onChange={e => setNewName(e.target.value)} placeholder="Name" />
                <Input T={T} value={newPassword} onChange={e => setNewPassword(e.target.value)} placeholder="Password *" type="password" />
                <Select T={T} value={newRole} onChange={e => setNewRole(e.target.value)} options={[
                  { value: 'client', label: 'Client' }, { value: 'ridge_admin', label: 'Ridge Admin' },
                ]} style={{ width: '100%' }} />
                {newRole === 'client' && (
                  <Select T={T} value={newWsId} onChange={e => setNewWsId(e.target.value)} options={[
                    { value: '', label: 'No workspace' },
                    ...workspaces.map(w => ({ value: w.id, label: w.name })),
                  ]} style={{ width: '100%' }} />
                )}
              </div>
              {createError && <div style={{ fontSize: 12, color: T.danger, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 5 }}><Icon name="alertTriangle" size={12} color={T.danger} />{createError}</div>}
              <Btn T={T} small onClick={createUser} disabled={creating || !newEmail || !newPassword}>
                {creating ? 'Creating…' : <><Icon name="plus" size={12} /> Create Account</>}
              </Btn>
            </div>

            {/* Users list */}
            <div style={{ fontSize: 11, fontWeight: 500, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 10 }}>
              All Accounts ({users.length})
            </div>
            <div style={{ background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 8, overflow: 'hidden' }}>
              {users.map((u, idx) => (
                <div key={u.id} style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  padding: '11px 14px',
                  borderBottom: idx < users.length - 1 ? `1px solid ${T.border}` : 'none',
                  gap: 8, flexWrap: 'wrap',
                }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: T.text, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{u.name || u.email}</div>
                    <div style={{ fontSize: 11, color: T.textMuted, display: 'flex', alignItems: 'center', gap: 6, marginTop: 2 }}>
                      {u.email}
                      <span style={{ color: T.textFaint }}>&middot;</span>
                      <Badge T={T} color={u.role === 'ridge_admin' ? 'green' : 'orange'}>{u.role}</Badge>
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                    {resetPwdUser?.id === u.id ? (
                      <div style={{ display: 'flex', gap: 6 }}>
                        <Input T={T} value={newPwd} onChange={e => setNewPwd(e.target.value)} placeholder="New password" type="password" style={{ width: 130 }} />

                      <Btn T={T} variant="outline" small onClick={() => setResetPwdUser(u)}>Reset Password</Btn>

                      <div style={{ display: 'flex', gap: 4 }}>
                        <Btn T={T} variant="danger" small onClick={() => deleteUser(u.id)}>Confirm</Btn>
                        <Btn T={T} variant="outline" small onClick={() => setConfirmDeleteUser(null)}><Icon name="x" size={12} /></Btn>
                      </div>
                    ) : (
                      u.id !== currentUser?.id && (
                        <Btn T={T} variant="danger" small onClick={() => setConfirmDeleteUser(u.id)}>Delete</Btn>
                      )
                    )}
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── Status Bar ─────────────────────────────────────────────────────────────
function StatusBar() {
  const [time, setTime] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  const fmt = (d) => {
    const pad = (n) => String(n).padStart(2, '0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  };
  const sep = (
    <span style={{ width: 1, height: 12, background: 'rgba(255,255,255,0.06)', display: 'inline-block', margin: '0 8px', flexShrink: 0 }} />
  );
  return (
    <div style={{
      height: 24, background: '#0D0F12', borderTop: '1px solid rgba(255,255,255,0.04)',
      display: 'flex', alignItems: 'center', padding: '0 12px',
      flexShrink: 0, userSelect: 'none',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 0, flex: 1 }}>
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#27AE60', display: 'inline-block', marginRight: 5, flexShrink: 0 }} />
        <span style={{ fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: '#27AE60', textTransform: 'uppercase', letterSpacing: '0.5px' }}>ONLINE</span>
        {sep}
        <span style={{ fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: '#5C6370' }}>v2.1.0</span>
        {sep}
        <span style={{ fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: '#5C6370' }}>{fmt(time)}</span>
      </div>
      <span style={{ fontSize: 9, color: '#5C6370', fontFamily: "'JetBrains Mono', monospace" }}>Ridge Strategy Engine</span>
    </div>
  );
}

// ─── Admin Dashboard ──────────────────────────────────────────────────────────
function AdminDashboard({ T, user, onLogout, mode, toggle }) {
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [activeNav, setActiveNav] = useState('workspaces');
  const [selectedWs, setSelectedWs] = useState(null);
  const [innerTab, setInnerTab] = useState('intake');

  const handleNav = (navId) => {
    if (navId === 'workspaces') {
      setSelectedWs(null);
      setActiveNav('workspaces');
    } else if (navId === 'accounts') {
      setSelectedWs(null);
      setActiveNav('accounts');
    } else if (navId === 'intake' && selectedWs) {
      setInnerTab('intake');
      setActiveNav('intake');
    } else if (navId === 'strategy' && selectedWs) {
      setInnerTab('strategy');
      setActiveNav('strategy');
    } else if (navId === 'intelligence' && selectedWs) {
      setInnerTab('intelligence');
      setActiveNav('intelligence');
    } else {
      setActiveNav(navId);
    }
  };

  const handleSelectWs = (ws) => {
    setSelectedWs(ws);
    setActiveNav('intake');
    setInnerTab('intake');
  };

  const navContext = selectedWs
    ? (innerTab === 'strategy' ? 'strategy' : innerTab === 'intelligence' ? 'intelligence' : 'intake')
    : activeNav;

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: T.bg, overflow: 'hidden' }}>
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
      <Sidebar
        collapsed={sidebarCollapsed}
        onToggle={() => setSidebarCollapsed(!sidebarCollapsed)}
        activeNav={navContext}
        onNav={handleNav}
        user={user}
        onLogout={onLogout}
        mode={mode}
        toggleTheme={toggle}
        wsSelected={!!selectedWs}
      />
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {activeNav === 'workspaces' && !selectedWs && (
          <WorkspacesView T={T} onSelect={handleSelectWs} breadcrumbs={['Workspaces']} collapsed={sidebarCollapsed} onToggleSidebar={() => setSidebarCollapsed(!sidebarCollapsed)} />
        )}
        {selectedWs && (
          <WorkspaceDetail T={T} workspace={selectedWs} activeInnerTab={innerTab} user={user}
            onBack={() => { setSelectedWs(null); setActiveNav('workspaces'); }}
            onDeleted={() => { setSelectedWs(null); setActiveNav('workspaces'); showToast('Workspace deleted'); }}
            onInnerTabChange={(t) => { setInnerTab(t); setActiveNav(t); }}
          />
        )}
        {activeNav === 'accounts' && (
          <div style={{ flex: 1, overflowY: 'auto', padding: '0' }}>
            <HeaderBar T={T} breadcrumbs={['Accounts']} collapsed={false} onToggleSidebar={null} />
            <div style={{ padding: '24px', maxWidth: 900, margin: '0 auto' }}>
              <ManageAccountsInline T={T} currentUser={user} />
            </div>
          </div>
        )}
      </div>
      <ToastContainer T={T} />
      </div>
      <StatusBar />
    </div>
  );
}

    await apiFetch(`/users?id=${uid}`, { method: 'DELETE' });
    setConfirmDeleteUser(null); load();
  };

  const resetPassword = async () => {
    if (!resetPwdUser || !newPwd) return;
    await apiFetch('/users/password', { method: 'POST', body: JSON.stringify({ id: resetPwdUser.id, password: newPwd }) });
    setResetPwdUser(null); setNewPwd('');
  };

  if (loading) return (
    <div style={{ padding: 40, textAlign: 'center', color: T.textMuted }}>
      <div style={{ fontSize: 13 }}>Loading accounts...</div>
    </div>
  );

  return (
    <div>
      {/* Create User */}
      <Card T={T} style={{ padding: 20, marginBottom: 20 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 16 }}>Create New Account</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
          <Input T={T} value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="Email *" type="email" />
          <Input T={T} value={newName} onChange={e => setNewName(e.target.value)} placeholder="Name" />
          <Input T={T} value={newPassword} onChange={e => setNewPassword(e.target.value)} placeholder="Password *" type="password" />
          <Select T={T} value={newRole} onChange={e => setNewRole(e.target.value)} options={[
            { value: 'client', label: 'Client' }, { value: 'ridge_admin', label: 'Ridge Admin' },
          ]} style={{ width: '100%' }} />
          {newRole === 'client' && (
            <Select T={T} value={newWsId} onChange={e => setNewWsId(e.target.value)} options={[
              { value: '', label: 'No workspace' },
              ...workspaces.map(w => ({ value: w.id, label: w.name })),
            ]} style={{ width: '100%' }} />
          )}
        </div>
        {createError && (
          <div style={{ fontSize: 12, color: T.danger, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6, padding: '8px 12px', background: T.dangerBg, borderRadius: 6 }}>
            <Icon name="alertTriangle" size={13} />
            {createError}
          </div>
        )}
        <Btn T={T} small onClick={createUser} disabled={creating || !newEmail || !newPassword}>
          {creating ? 'Creating...' : <><Icon name="plus" size={13} />Create Account</>}
        </Btn>
      </Card>

      {/* Users Table */}
      <Card T={T} style={{ overflow: 'hidden' }}>
        <div style={{ padding: '14px 16px', borderBottom: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.5px' }}>
            All Accounts ({users.length})
          </div>
        </div>
        <div style={{ maxHeight: 480, overflowY: 'auto' }}>
          {users.map(u => (
            <div key={u.id} style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '12px 16px', borderBottom: `1px solid ${T.border}`, gap: 8,
            }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{u.name || u.email}</div>
                <div style={{ fontSize: 12, color: T.textMuted, display: 'flex', alignItems: 'center', gap: 6, marginTop: 2 }}>
                  {u.email}
                  <span style={{ color: T.border }}>·</span>
                  <Badge T={T} color={u.role === 'ridge_admin' ? 'green' : 'orange'}>{u.role}</Badge>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                {resetPwdUser?.id === u.id ? (
                  <div style={{ display: 'flex', gap: 6 }}>
                    <Input T={T} value={newPwd} onChange={e => setNewPwd(e.target.value)} placeholder="New password" type="password" style={{ width: 140 }} />
                    <Btn T={T} small onClick={resetPassword} disabled={!newPwd}>Save</Btn>
                    <Btn T={T} variant="outline" small onClick={() => setResetPwdUser(null)}><Icon name="x" size={12} /></Btn>
                  </div>
                ) : (
                  <Btn T={T} variant="outline" small onClick={() => setResetPwdUser(u)}>Reset Password</Btn>
                )}
                {confirmDeleteUser === u.id ? (
                  <div style={{ display: 'flex', gap: 4 }}>
                    <Btn T={T} variant="danger" small onClick={() => deleteUser(u.id)}>Confirm</Btn>
                    <Btn T={T} variant="outline" small onClick={() => setConfirmDeleteUser(null)}><Icon name="x" size={12} /></Btn>
                  </div>
                ) : (
                  u.id !== currentUser?.id && (
                    <Btn T={T} variant="danger" small onClick={() => setConfirmDeleteUser(u.id)}>Delete</Btn>
                  )
                )}
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const { T, mode, toggle, setMode } = useTheme();
  const [user, setUser] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);

  useEffect(() => {
    const urlParams = new URLSearchParams(window.location.search);
    const tokenFromUrl = urlParams.get('token');
    if (tokenFromUrl) persistToken(tokenFromUrl);

    const timeout = setTimeout(() => setAuthChecked(true), 2000);
    apiFetch('/auth/session').then(data => {
      clearTimeout(timeout);
      if (data?.expired) {
        clearToken();
      } else if (data?.user) {
        setUser(data.user);
      }
      apiFetch('/settings?key=theme').then(d => {
        if (d?.value === 'dark' || d?.value === 'light') setMode(d.value);
      });
      setAuthChecked(true);
    }).catch(() => { clearTimeout(timeout); setAuthChecked(true); });
  }, []);

  const handleLogin = (userData, token) => {
    persistToken(token);
    setUser(userData);
    apiFetch('/settings?key=theme').then(d => {
      if (d?.value === 'dark' || d?.value === 'light') setMode(d.value);
    });
  };

  const handleLogout = async () => {
    if (SESSION_TOKEN) {
      await apiFetch('/auth/logout', { method: 'POST', body: JSON.stringify({ token: SESSION_TOKEN }) });
    }
    clearToken();
    setUser(null);
  };

  if (!authChecked) {
    return (
      <div style={{ height: '100vh', background: '#1B2028', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 24 }}>
          <OrbitalLoader T={T} progress={0} status="Initializing" />
        </div>
      </div>
    );
  }

  if (!user) return <LoginScreen T={T} onLogin={handleLogin} />;

  if (user.role === 'ridge_admin') {
    return <AdminDashboard T={T} user={user} onLogout={handleLogout} mode={mode} toggle={toggle} />;
  }

  return <ClientDashboard T={T} user={user} onLogout={handleLogout} mode={mode} toggle={toggle} />;
}

// Error Boundary to prevent white screen crashes
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('Ridge Engine Error:', error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {
        style: { height: '100vh', background: '#1B2028', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }
      },
        React.createElement('img', { src: './logo-dark.png', alt: 'Ridge', style: { height: 26 } }),
        React.createElement('div', { style: { color: '#E8EAED', fontSize: 14, fontWeight: 500 } }, 'Something went wrong.'),
        React.createElement('button', {
          onClick: () => window.location.reload(),
          style: { padding: '8px 20px', borderRadius: 6, fontSize: 13, background: '#1C3C34', color: '#fff', border: 'none', cursor: 'pointer' }
        }, 'Reload')
      );
    }
    return this.props.children;
  }
}

createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
