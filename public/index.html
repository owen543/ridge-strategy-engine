<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;font-size:13px;background:#1B2028}
#root{height:100%}
input,textarea,select,button{font-family:inherit}
button{cursor:pointer;border:none;background:none}
textarea{resize:vertical}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.14)}
.mono{font-family:'JetBrains Mono','SF Mono','Fira Code',monospace}
.tabular{font-variant-numeric:tabular-nums lining-nums}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes slideInRight{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeScaleIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes orbitalSpin1{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes orbitalSpin2{0%{transform:rotate(120deg)}100%{transform:rotate(480deg)}}
@keyframes orbitalSpin3{0%{transform:rotate(240deg)}100%{transform:rotate(600deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseRing{0%{opacity:0.6;transform:scale(0.95)}50%{opacity:1;transform:scale(1)}100%{opacity:0.6;transform:scale(0.95)}}
@keyframes borderGlow{0%,100%{border-color:rgba(28,60,52,0.4)}50%{border-color:rgba(91,158,138,0.55)}}
@keyframes dataShimmer{0%,100%{opacity:0.85}50%{opacity:1}}
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.5s ease infinite}
.fade-slide-in{animation:fadeSlideIn 200ms ease both}
.data-shimmer{animation:dataShimmer 4s ease infinite}
.sidebar-active-border{animation:borderGlow 3s ease infinite}
input:focus,.input-focused{animation:borderGlow 3s ease infinite}
@media(max-width:768px){
  .two-col-grid{grid-template-columns:1fr!important}
  .ws-grid{grid-template-columns:1fr!important}
  .hide-mobile{display:none!important}
  .strategy-layout{flex-direction:column!important}
  .strategy-tabs-vert{width:100%!important;flex-direction:row!important;overflow-x:auto!important;border-right:none!important;border-bottom:1px solid rgba(255,255,255,0.06)!important;flex-shrink:0!important}
  .strategy-tab-btn{flex-shrink:0!important;white-space:nowrap!important}
}

// ─── Persistent session token (localStorage with in-memory fallback) ──────────
let SESSION_TOKEN = null;
try { SESSION_TOKEN = localStorage.getItem('ridge_session_token'); } catch {}
function persistToken(token) {
  SESSION_TOKEN = token;
  try { if (token) localStorage.setItem('ridge_session_token', token); else localStorage.removeItem('ridge_session_token'); } catch {}
}
function clearToken() { persistToken(null); }

async function apiFetch(path, options = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const url = SESSION_TOKEN
    ? `${API}${path}${sep}token=${SESSION_TOKEN}`
    : `${API}${path}`;
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    ...options,
  });
  const text = await res.text();
  try { return JSON.parse(text); } catch { return {}; }
}

// ─── Robust JSON Parser ──────────────────────────────────────────────────────
function robustJsonParse(raw) {
  if (!raw || typeof raw !== 'string') throw new Error('Empty or non-string input');
  let s = raw.trim();
  s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
  const start = s.indexOf('{');
  const end = s.lastIndexOf('}');
  if (start !== -1 && end !== -1 && end > start) s = s.slice(start, end + 1);
  s = s.replace(/['']/g, "'").replace(/[""]/g, '"').replace(/\t/g, ' ');
  try { return JSON.parse(s); } catch {}
  s = s.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
  try { return JSON.parse(s); } catch {}
  let fixed = ''; let inString = false; let escape = false;
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (escape) { fixed += c; escape = false; continue; }
    if (c === '\\') { fixed += c; escape = true; continue; }
    if (c === '"') inString = !inString;
    if (inString && (c === '\n' || c === '\r')) { fixed += ' '; continue; }
    fixed += c;
  }
  try { return JSON.parse(fixed); } catch {}
  for (let i = fixed.length - 1; i >= 0; i--) {
    if (fixed[i] === '}') {
      try { return JSON.parse(fixed.slice(0, i + 1)); } catch {}
    }
  }
  throw new Error('JSON parse failed after all repair stages. Raw: ' + s.slice(0, 100));
}

// ─── Toast System ────────────────────────────────────────────────────────────
const toastListeners = [];
function showToast(message, type = 'success') {
  toastListeners.forEach(fn => fn({ message, type, id: Date.now() + Math.random() }));
}

function ToastContainer({ T }) {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    const handler = (t) => {
      setToasts(prev => [...prev, t]);
      setTimeout(() => setToasts(prev => prev.filter(x => x.id !== t.id)), 3800);
    };
    toastListeners.push(handler);
    return () => { const idx = toastListeners.indexOf(handler); if (idx > -1) toastListeners.splice(idx, 1); };
  }, []);

  const borderColor = (type) => type === 'error' ? '#E25555' : type === 'warning' ? '#E2A040' : '#27AE60';

  return (
    <div style={{ position: 'fixed', bottom: 48, right: 24, zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8 }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          display: 'flex', alignItems: 'center', gap: 10,
          padding: '10px 14px', borderRadius: 8,
          background: '#232A33',
          border: '1px solid rgba(255,255,255,0.08)',
          borderLeft: `4px solid ${borderColor(t.type)}`,
          boxShadow: '0 4px 16px rgba(0,0,0,0.4)',
          animation: 'slideInRight 0.2s cubic-bezier(0.16,1,0.3,1)',
          maxWidth: 340, minWidth: 220,
          fontSize: 13, fontWeight: 500, color: '#E8EAED',
        }}>
          <Icon name={t.type === 'error' ? 'x' : t.type === 'warning' ? 'alertTriangle' : 'check'} size={14} color={borderColor(t.type)} />
          {t.message}
        </div>
      ))}
    </div>
  );
}

function useTheme() {
  const [mode, setMode] = useState('dark');
  const T = mode === 'dark' ? DARK : LIGHT;
  const toggle = () => {
    const next = mode === 'dark' ? 'light' : 'dark';
    setMode(next);
    apiFetch('/settings', { method: 'POST', body: JSON.stringify({ key: 'theme', value: next }) });
  };
  return { T, mode, toggle, setMode };
}

// ─── RadialGauge ─────────────────────────────────────────────────────────────
function RadialGauge({ T, score, size = 36 }) {
  const [mounted, setMounted] = useState(false);
  useEffect(() => { const t = setTimeout(() => setMounted(true), 50); return () => clearTimeout(t); }, []);
  const radius = (size - 6) / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - ((mounted ? score : 0) / 100) * circumference;
  const color = score >= 80 ? T.success : score >= 60 ? T.warning : T.danger;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={T.border} strokeWidth={3} />
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={3}
          strokeDasharray={circumference} strokeDashoffset={offset}
          strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.8s ease' }} />
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: size <= 36 ? 9 : 11,
        fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, color: T.text,
        fontVariantNumeric: 'tabular-nums lining-nums',
      }}>{score}</div>
    </div>
  );
}

// ─── ScoreBar (replaces RadialGauge) ──────────────────────────────────────────
function ScoreBar({ T, score, size = 36 }) {
  const color = score >= 80 ? T.success : score >= 60 ? T.warning : T.danger;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
      <div style={{ width: 80, height: 4, background: 'rgba(255,255,255,0.04)', borderRadius: 2, overflow: 'hidden' }}>
        <div style={{
          width: `${Math.max(0, Math.min(100, score))}%`, height: '100%',
          background: color, borderRadius: 2,
          transition: 'width 0.6s ease',
        }} />
      </div>
      <span style={{
        fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
        fontWeight: 500, color, minWidth: 24, textAlign: 'right',
        fontVariantNumeric: 'tabular-nums lining-nums',
      }}>{score}</span>
    </div>
  );
}

// ─── OrbitalLoader ───────────────────────────────────────────────────────────
function ArcLoader({ T, progress, status }) {
  const r = 54;
  const circ = 2 * Math.PI * r;
  const offset = circ - (progress / 100) * circ;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '40px 0' }}>
      <div style={{ position: 'relative', width: 120, height: 120 }}>
        <svg width={120} height={120} viewBox="0 0 120 120" style={{ transform: 'rotate(-90deg)' }}>
          <circle cx={60} cy={60} r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={3} />
          <circle cx={60} cy={60} r={r} fill="none" stroke="#5B9E8A" strokeWidth={3}
            strokeDasharray={circ} strokeDashoffset={offset}
            strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.6s ease' }} />
        </svg>
        <div style={{
          position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: "'JetBrains Mono', monospace", fontSize: 24, fontWeight: 600, color: '#E8EAED',
          fontVariantNumeric: 'tabular-nums lining-nums',
        }}>{progress}%</div>
      </div>
      <div style={{ marginTop: 16, fontSize: 10, color: '#5C6370', letterSpacing: '1px', textTransform: 'uppercase' }}>
        {status}
      </div>
    </div>
  );
}

function OrbitalLoader({ T, progress, status }) {
  return <ArcLoader T={T} progress={progress} status={status} />;
}

  const base = {

    padding: small ? '4px 10px' : '6px 14px',
    height: small ? 26 : 30,
    borderRadius: 3, fontSize: small ? 11 : 12, fontWeight: 500,
    cursor: disabled ? 'not-allowed' : 'pointer',
    transition: 'background 0.15s ease, color 0.15s ease',
    opacity: disabled ? 0.45 : 1,
    letterSpacing: '0.01em',
    lineHeight: 1,
    boxShadow: 'none',
    ...style,
  };
  const handlers = {
    onMouseEnter: () => !disabled && setHovered(true),
    onMouseLeave: () => setHovered(false),
  };
  if (variant === 'primary') return (
    <button onClick={onClick} disabled={disabled} {...handlers} style={{
      ...base, background: hovered && !disabled ? T.btnPrimaryHover : T.btnPrimaryBg,
      color: T.btnPrimaryText, border: 'none',
    }}>{children}</button>
  );
  if (variant === 'danger') return (
    <button onClick={onClick} disabled={disabled} {...handlers} style={{
      ...base, background: hovered && !disabled ? '#CC2020' : T.danger,
      color: '#fff', border: 'none',
    }}>{children}</button>
  );
  return (
    <button onClick={onClick} disabled={disabled} {...handlers} style={{
      ...base,
      background: hovered && !disabled ? 'rgba(255,255,255,0.03)' : 'transparent',
      color: hovered && !disabled ? T.text : T.textSecondary,
      border: `1px solid ${hovered ? T.borderHover : T.border}`,
    }}>{children}</button>
  );
}

// ─── Input ────────────────────────────────────────────────────────────────────
function Input({ T, value, onChange, placeholder, type = 'text', style = {}, multiline = false, rows = 3 }) {
  const [focused, setFocused] = useState(false);
  const bgInput = T.bg === '#1B2028' ? '#141820' : T.bgInput;
  const base = {
    width: '100%',
    padding: multiline ? '8px 8px' : '0 8px',
    height: multiline ? 'auto' : 32,
    borderRadius: 3,
    border: `1px solid ${focused ? T.accentBorder : T.border}`,
    background: bgInput,
    color: T.text, fontSize: 13, outline: `${focused ? '1px solid ' + T.accentText : 'none'}`,
    outlineOffset: '1px',
    fontFamily: "'DM Sans', system-ui, sans-serif",
    transition: 'border-color 0.15s',
    lineHeight: 1.5,
    ...style,
  };
  if (multiline) return (
    <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows}
      style={{ ...base, paddingTop: 8, paddingBottom: 8, resize: 'vertical', height: 'auto' }}
      onFocus={() => setFocused(true)} onBlur={() => setFocused(false)} />
  );
  return (
    <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={base}
      onFocus={() => setFocused(true)} onBlur={() => setFocused(false)} />
  );
}

// ─── Select ───────────────────────────────────────────────────────────────────
function Select({ T, value, onChange, options, style = {} }) {
  return (
    <select value={value} onChange={onChange} style={{
      padding: '0 10px', height: 32, borderRadius: 6, border: `1px solid ${T.border}`,
      background: T.bgInput, color: T.text, fontSize: 13, outline: 'none',
      fontFamily: "'DM Sans', system-ui, sans-serif", cursor: 'pointer',
      transition: 'border-color 0.15s', ...style,
    }}>
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}

}

// ─── Card ─────────────────────────────────────────────────────────────────────
function Card({ T, children, style = {}, onClick, hover = false }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={hover ? () => setHovered(true) : undefined}
      onMouseLeave={hover ? () => setHovered(false) : undefined}
      style={{
        background: T.bgCard,
        border: `1px solid ${hovered ? T.borderHover : T.border}`,
        borderRadius: 8,
        transition: 'border-color 0.15s',
        ...style,
      }}>{children}</div>

}

// ─── CopyBtn ──────────────────────────────────────────────────────────────────
function CopyBtn({ T, text, small = true }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  };
  return (
    <button onClick={copy} title="Copy" style={{
      padding: '3px 7px', borderRadius: 5, fontSize: 11, fontWeight: 500,
      border: `1px solid ${T.border}`, background: T.bgElevated,
      color: copied ? T.success : T.textMuted,
      cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 4,
      transition: 'all 0.15s', flexShrink: 0,
    }}>
      <Icon name={copied ? 'check' : 'copy'} size={11} />
      {copied ? 'Copied' : 'Copy'}
    </button>
  );
}

// ─── Field ────────────────────────────────────────────────────────────────────
function Field({ T, label, children }) {
  return (

}

// ─── Google Sign-In Config ────────────────────────────────────────────────────
const GOOGLE_CLIENT_ID = '1000143986015-rac7id2ad043kmogn7b685uhuco2alfm.apps.googleusercontent.com';

// ─── Login Screen ─────────────────────────────────────────────────────────────
function LoginScreen({ T, onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [googleLoading, setGoogleLoading] = useState(false);
  const [lockedOut, setLockedOut] = useState(false);
  const [lockCountdown, setLockCountdown] = useState(0);
  const [attemptsRemaining, setAttemptsRemaining] = useState(null);
  const countdownRef = useRef(null);
  const googleBtnRef = useRef(null);

  // Countdown timer for rate limiting lockout
  useEffect(() => {
    if (lockCountdown <= 0) {
      setLockedOut(false);
      if (countdownRef.current) clearInterval(countdownRef.current);
      return;
    }
    countdownRef.current = setInterval(() => {
      setLockCountdown(prev => {
        if (prev <= 1) { setLockedOut(false); return 0; }
        return prev - 1;
      });
    }, 1000);
    return () => { if (countdownRef.current) clearInterval(countdownRef.current); };
  }, [lockCountdown > 0]);

  const formatCountdown = (s) => {
    if (s < 60) return `${s}s`;
    const m = Math.floor(s / 60); const sec = s % 60;
    return sec > 0 ? `${m}m ${sec}s` : `${m}m`;
  };

  const handleGoogleResponse = useCallback(async (response) => {
    setError(''); setGoogleLoading(true);
    try {
      const data = await apiFetch('/auth/google', {
        method: 'POST', body: JSON.stringify({ credential: response.credential }),
      });
      if (data.error) { setError(data.error); setGoogleLoading(false); return; }
      persistToken(data.token);
      onLogin(data.user, data.token);
    } catch (e) {
      setError('Google sign-in failed. Please try again.'); setGoogleLoading(false);
    }
  }, [onLogin]);

  const [gsiReady, setGsiReady] = useState(false);
  const [gsiError, setGsiError] = useState(false);

  useEffect(() => {
    if (!GOOGLE_CLIENT_ID) return;
    const initGoogle = () => {
      try {
        if (window.google && window.google.accounts) {
          window.google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleGoogleResponse,
            auto_select: false,
            itp_support: true,
          });
          if (googleBtnRef.current) {
            window.google.accounts.id.renderButton(googleBtnRef.current, {
              type: 'standard',
              theme: 'filled_black',
              size: 'large',
              width: 364,
              text: 'signin_with',
              shape: 'rectangular',
              logo_alignment: 'left',
            });
          }
          setGsiReady(true);
        }
      } catch (err) {
        console.warn('Google Sign-In init failed:', err);
        setGsiError(true);
      }
    };
    if (window.google && window.google.accounts) {
      initGoogle();
    } else {
      // Dynamically load Google Identity Services script
      if (!document.getElementById('gsi-script')) {
        const s = document.createElement('script');
        s.id = 'gsi-script';
        s.src = 'https://accounts.google.com/gsi/client';
        s.async = true;
        s.defer = true;
        s.onerror = () => { console.warn('Failed to load Google Sign-In script'); setGsiError(true); };
        document.head.appendChild(s);
      }
      const checkInterval = setInterval(() => {
        try {
          if (window.google && window.google.accounts) {
            clearInterval(checkInterval);
            initGoogle();
          }
        } catch (err) {
          clearInterval(checkInterval);
          console.warn('Google Sign-In check failed:', err);
          setGsiError(true);
        }
      }, 200);
      // Stop trying after 8 seconds
      const timeout = setTimeout(() => { clearInterval(checkInterval); setGsiError(true); }, 8000);
      return () => { clearInterval(checkInterval); clearTimeout(timeout); };
    }
  }, [handleGoogleResponse]);

  const handleLogin = async () => {
    if (lockedOut) return;
    setError(''); setLoading(true);
    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST', body: JSON.stringify({ email, password }),
      });
      if (data.retryAfter) {
        setLockedOut(true);
        setLockCountdown(data.retryAfter);
        setError(data.error);
        setAttemptsRemaining(0);
        setLoading(false);
        return;
      }
      if (data.error) {
        if (typeof data.remaining === 'number') setAttemptsRemaining(data.remaining);
        setError(data.error);
        setLoading(false);
        return;
      }
      setAttemptsRemaining(null);
      persistToken(data.token);
      onLogin(data.user, data.token);
    } catch (e) {
      setError('Connection error. Please try again.'); setLoading(false);
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && email && password && !loading && !lockedOut) handleLogin();
  };

  // Custom Google button for when GIS library is not loaded or no client ID
  const GoogleIcon = () => (
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
  );

  return (
    <div style={{
      minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: '#1B2028',
      backgroundImage: 'radial-gradient(ellipse at 50% 0%, rgba(28,60,52,0.18) 0%, transparent 65%)',
    }}>
      <div style={{ width: '100%', maxWidth: 420, padding: '0 20px' }}>
        {/* Logo */}
        <div style={{ textAlign: 'center', marginBottom: 28 }}>
          <img src="./logo-dark.png" alt="Ridge" style={{ height: 26, objectFit: 'contain' }} />
        </div>

        {/* Card */}
        <div style={{
          background: '#232A33',
          border: '1px solid rgba(28,60,52,0.4)',
          boxShadow: '0 0 32px rgba(28,60,52,0.12), 0 4px 16px rgba(0,0,0,0.4)',
          borderRadius: 10, padding: 28,
        }}>
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 16, fontWeight: 600, color: '#E8EAED', marginBottom: 4 }}>
              Sign in
            </div>
            <div style={{ fontSize: 12, color: '#5C6370' }}>
              Enter your credentials to continue
            </div>
          </div>

          {/* Google Sign-In */}
          <div style={{ marginBottom: 20 }}>
            {GOOGLE_CLIENT_ID && !gsiError && (
              <div ref={googleBtnRef} style={{ display: gsiReady ? 'flex' : 'none', justifyContent: 'center' }} />
            )}
            {(!gsiReady || gsiError || !GOOGLE_CLIENT_ID) && (
              <button
                onClick={() => {
                  if (!GOOGLE_CLIENT_ID || gsiError) {
                    setError('Google Sign-In is temporarily unavailable. Please use email and password.');
                  }
                }}
                style={{
                  width: '100%', height: 40, borderRadius: 6, fontSize: 13, fontWeight: 500,
                  background: '#131314', color: '#E3E3E3', border: '1px solid #5f6368',
                  cursor: (!GOOGLE_CLIENT_ID || gsiError) ? 'pointer' : 'wait',
                  display: gsiReady && !gsiError ? 'none' : 'flex',
                  alignItems: 'center', justifyContent: 'center', gap: 10,
                  fontFamily: "'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif",
                  opacity: (!GOOGLE_CLIENT_ID || gsiError) ? 0.85 : 0.7,
                }}
              >
                <GoogleIcon />
                Sign in with Google
              </button>
            )}
            {googleLoading && (
              <div style={{ textAlign: 'center', marginTop: 8 }}>
                <span style={{ fontSize: 12, color: '#5C6370' }}>Authenticating with Google...</span>

          {/* Divider */}

              }}>
                <Icon name="alertTriangle" size={13} color="#E25555" />

              </div>

const INTAKE_DEFAULTS = {
  company: { name: '', website: '', description: '', size_range: '', industry: '' },
  offer: { name: '', description: '', pricing_model: '', avg_deal_size: '', differentiators: '' },
  icp: { description: '', company_size: { min: '', max: '' }, industries: '', geographies: '', technographics: '', excluded_segments: '' },
  value_props: { primary: '', secondary: '', proof_points: '' },
  pain_points: { primary: '', secondary: '', status_quo_cost: '' },
  constraints: { excluded_titles: '', tone_preference: '', compliance_notes: '', other: '' },
};

function deepMerge(target, source) {
  const result = { ...target };
  for (const key in source) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
      result[key] = deepMerge(target[key] || {}, source[key]);
    } else {
      result[key] = source[key];
    }
  }
  return result;
}

function mergeIntoEmpty(existing, scanned) {
  const result = JSON.parse(JSON.stringify(existing));
  for (const section in scanned) {
    if (!result[section]) result[section] = {};
    if (typeof scanned[section] === 'object' && !Array.isArray(scanned[section])) {
      for (const field in scanned[section]) {
        if (typeof scanned[section][field] === 'object' && !Array.isArray(scanned[section][field])) {
          if (!result[section][field]) result[section][field] = {};
          for (const sub in scanned[section][field]) {
            if (!result[section][field][sub]) result[section][field][sub] = scanned[section][field][sub];
          }
        } else {
          if (!result[section][field]) result[section][field] = scanned[section][field];
        }
      }
    }
  }
  return result;
}

function buildIntakeBlock(intake) {
  const i = intake;
  return `Company: ${i.company.name} | ${i.company.website} | ${i.company.industry} | Size: ${i.company.size_range} | ${i.company.description}
Offer: ${i.offer.name} | ${i.offer.description} | Pricing: ${i.offer.pricing_model} | Deal: ${i.offer.avg_deal_size} | Diff: ${i.offer.differentiators}
ICP: ${i.icp.description} | Size: ${i.icp.company_size.min}-${i.icp.company_size.max} | Industries: ${i.icp.industries} | Geo: ${i.icp.geographies} | Tech: ${i.icp.technographics} | Exclude: ${i.icp.excluded_segments}
Value Props: ${i.value_props.primary} | ${i.value_props.secondary} | Proof: ${i.value_props.proof_points}
Pain Points: ${i.pain_points.primary} | ${i.pain_points.secondary} | Cost: ${i.pain_points.status_quo_cost}
Constraints: Exclude titles: ${i.constraints.excluded_titles} | Tone: ${i.constraints.tone_preference} | Compliance: ${i.constraints.compliance_notes} | Other: ${i.constraints.other}`;
}

function IntakeForm({ T, workspaceId, onIntakeChange }) {
  const [intake, setIntake] = useState(INTAKE_DEFAULTS);
  const [scanUrl, setScanUrl] = useState('');
  const [scanning, setScanning] = useState(false);
  const [scanMsg, setScanMsg] = useState('');
  const [notes, setNotes] = useState('');
  const [notesSource, setNotesSource] = useState('Circleback');
  const [importing, setImporting] = useState(false);
  const [importMsg, setImportMsg] = useState('');
  const debounceRef = useRef(null);

  useEffect(() => {
    apiFetch(`/intake?workspace_id=${workspaceId}`).then(data => {
      if (data && Object.keys(data).length > 0) {
        const merged = deepMerge(INTAKE_DEFAULTS, data);
        setIntake(merged);
        if (onIntakeChange) onIntakeChange(merged);
      }
    });
  }, [workspaceId]);

  const save = useCallback((newIntake) => {
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      apiFetch('/intake', { method: 'POST', body: JSON.stringify({ workspace_id: workspaceId, data: newIntake }) })
        .then(() => showToast('Intake saved', 'success'));
      if (onIntakeChange) onIntakeChange(newIntake);
    }, 800);
  }, [workspaceId]);

  const update = (section, field, val) => {
    const next = { ...intake, [section]: { ...intake[section], [field]: val } };
    setIntake(next); save(next);
  };
  const updateNested = (section, sub, field, val) => {
    const next = { ...intake, [section]: { ...intake[section], [sub]: { ...intake[section][sub], [field]: val } } };
    setIntake(next); save(next);
  };

  const handleScan = async () => {
    if (!scanUrl) return;
    setScanning(true); setScanMsg('Scanning website with AI + web search…');
    try {
      const res = await fetch(AI_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'scan_website', url: scanUrl }),
      });
      const result = await res.json();
      if (result.ok && result.text) {
        const parsed = robustJsonParse(result.text);
        const merged = mergeIntoEmpty(intake, parsed);
        setIntake(merged); save(merged);
        setScanMsg(`Scan complete via ${result.provider} (${result.model}). Empty fields filled from web research.`);
        showToast('Website scanned — data merged into empty fields', 'success');
      } else {
        setScanMsg('Scan failed: ' + (result.error || 'Unknown error'));
        showToast('Website scan failed', 'error');
      }
    } catch (err) {
      setScanMsg('Scan error: ' + err.message);
      showToast('Scan error', 'error');
    }
    setScanning(false);
  };

  const handleImport = async () => {
    if (!notes) return;
    setImporting(true); setImportMsg('Extracting structured data from meeting notes with AI…');
    try {
      const res = await fetch(AI_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'extract_notes', notes: notes, source: notesSource }),
      });
      const result = await res.json();
      if (result.ok && result.text) {
        const parsed = robustJsonParse(result.text);
        const merged = mergeIntoEmpty(intake, parsed);
        setIntake(merged); save(merged);
        setImportMsg(`Import complete via ${result.provider}. Data extracted and merged into empty fields.`);
        showToast('Meeting notes imported — data merged', 'success');
      } else {
        setImportMsg('Import failed: ' + (result.error || 'Unknown error'));
        showToast('Notes import failed', 'error');
      }
    } catch (err) {
      setImportMsg('Import error: ' + err.message);
      showToast('Import error', 'error');
    }
    setImporting(false);
  };

  return (
    <div>
      {/* Tools row */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }} className="two-col-grid">
        {/* Scanner */}
        <div style={{ background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 8, padding: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 500, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6 }}>
            <Icon name="search" size={12} color={T.accentText} /> Website Scanner
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <Input T={T} value={scanUrl} onChange={e => setScanUrl(e.target.value)} placeholder="https://company.com" style={{ flex: 1 }} />
            <Btn T={T} onClick={handleScan} disabled={scanning || !scanUrl} small>
              {scanning ? <><Icon name="loader" size={12} style={{ animation: 'spin 1s linear infinite' }} /> Scanning</> : 'Scan'}
            </Btn>
          </div>
          {scanMsg && <div style={{ marginTop: 7, fontSize: 11, color: T.textMuted, lineHeight: 1.5 }}>{scanMsg}</div>}
        </div>

        {/* Meeting Notes */}
        <div style={{ background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 8, padding: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 500, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6 }}>
            <Icon name="clipboard" size={12} color={T.accentText} /> Meeting Notes
          </div>
          <div style={{ display: 'flex', gap: 8, marginBottom: 7 }}>
            <Select T={T} value={notesSource} onChange={e => setNotesSource(e.target.value)}
              options={[{ value: 'Circleback', label: 'Circleback' }, { value: 'Granola', label: 'Granola' }, { value: 'Fathom', label: 'Fathom' }, { value: 'Otter', label: 'Otter' }, { value: 'Raw Text', label: 'Raw Text' }]}
              style={{ flex: 1 }} />
            <Btn T={T} onClick={handleImport} disabled={importing || !notes} small>
              {importing ? <><Icon name="loader" size={12} style={{ animation: 'spin 1s linear infinite' }} /> Importing</> : 'Import'}
            </Btn>
          </div>
          <Input T={T} value={notes} onChange={e => setNotes(e.target.value)} multiline rows={2} placeholder="Paste meeting notes here…" />
          {importMsg && <div style={{ marginTop: 7, fontSize: 11, color: T.textMuted, lineHeight: 1.5 }}>{importMsg}</div>}
        </div>
      </div>

      <IntakeSection T={T} title="Company" iconName="building" defaultOpen={true}>
        <IntakeField T={T} label="Company Name" value={intake.company.name} onChange={e => update('company', 'name', e.target.value)} />
        <IntakeField T={T} label="Website" value={intake.company.website} onChange={e => update('company', 'website', e.target.value)} />
        <IntakeField T={T} label="Description" value={intake.company.description} onChange={e => update('company', 'description', e.target.value)} multiline rows={3} hint="What does the company do?" />
        <div className="two-col-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <IntakeField T={T} label="Size Range" value={intake.company.size_range} onChange={e => update('company', 'size_range', e.target.value)} hint="e.g. 50-200" />
          <IntakeField T={T} label="Industry" value={intake.company.industry} onChange={e => update('company', 'industry', e.target.value)} />
        </div>
      </IntakeSection>

// ─── Strategy Generator ───────────────────────────────────────────────────────
function StrategyGenerator({ T, workspaceId, onStrategyGenerated, intake }) {
  const [progress, setProgress] = useState(0);
  const [status, setStatus] = useState('');
  const [running, setRunning] = useState(false);
  const [model, setModel] = useState('sonnet');
  const [error, setError] = useState('');

  const runStrategyLive = async () => {
    setRunning(true); setProgress(0); setError('');
    setStatus('Loading intake data…');
    setProgress(5);

    const currentIntake = intake || INTAKE_DEFAULTS;
    const companyName = currentIntake.company.name || 'Unknown Company';
    const intakeBlock = buildIntakeBlock(currentIntake);

    setProgress(10); setStatus('Generating research & targeting (Part A)…');

    try {
      let resA, resB;
      try {
        const rawA = await fetch(AI_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'strategy_part_a', company_name: companyName, intake_block: intakeBlock, model }),
        });
        resA = await rawA.json();
      } catch (e) {
        resA = { ok: false, error: 'Part A network error: ' + e.message };
      }

      setProgress(45); setStatus('Part A received. Generating execution & messaging (Part B)…');

      try {
        const rawB = await fetch(AI_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'strategy_part_b', company_name: companyName, intake_block: intakeBlock, model }),
        });
        resB = await rawB.json();
      } catch (e) {
        resB = { ok: false, error: 'Part B network error: ' + e.message };
      }

      setProgress(70); setStatus('Both responses received, parsing…');

      let parsedA = {}, parsedB = {};
      if (resA.ok && resA.text) {
        try { parsedA = robustJsonParse(resA.text); } catch (e) { console.warn('Part A parse error:', e); }
      } else {
        console.warn('Part A failed:', resA.error);
      }
      if (resB.ok && resB.text) {
        try { parsedB = robustJsonParse(resB.text); } catch (e) { console.warn('Part B parse error:', e); }
      } else {
        console.warn('Part B failed:', resB.error);
      }

      if (!resA.ok && !resB.ok) {
        setError(`Both API calls failed. A: ${resA.error || 'unknown'}. B: ${resB.error || 'unknown'}`);
        setRunning(false);
        showToast('Strategy generation failed', 'error');
        return;
      }

      setProgress(85); setStatus('Merging strategy halves…');
      const fullStrategy = { ...parsedA, ...parsedB };

      setProgress(92); setStatus('Saving strategy…');
      await apiFetch('/strategy', {
        method: 'POST',
        body: JSON.stringify({ workspace_id: workspaceId, data: fullStrategy }),
      });

      setProgress(100); setStatus(`Strategy complete! Generated via ${resA.provider || 'AI'} (${resA.model || model})`);
      showToast('Strategy generated successfully', 'success');
      onStrategyGenerated(fullStrategy);
    } catch (err) {
      setError('Network error: ' + err.message);
      showToast('Strategy generation error', 'error');
    }
    setRunning(false);
  };

  const runStrategyDemo = async () => {
    setRunning(true); setProgress(0); setStatus('Loading demo strategy…');
    const steps = [
      [400, 25, 'Simulating Part A…'], [400, 50, 'Simulating Part B…'],
      [300, 75, 'Merging…'], [200, 100, 'Demo strategy loaded!'],
    ];
    for (const [delay, pct, msg] of steps) {
      await new Promise(r => setTimeout(r, delay));
      setProgress(pct); setStatus(msg);
    }
    await apiFetch('/strategy', { method: 'POST', body: JSON.stringify({ workspace_id: workspaceId, data: DEMO_STRATEGY }) });
    onStrategyGenerated(DEMO_STRATEGY);
    setRunning(false);
  };

  return (
    <div style={{ background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 8, padding: 16, marginBottom: 14 }}>
      <div style={{ fontWeight: 600, fontSize: 13, color: T.text, marginBottom: 4 }}>Strategy Generation</div>
      <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 12, lineHeight: 1.6 }}>
        Runs two AI calls (Research &amp; Targeting + Execution &amp; Messaging) via Claude Sonnet, with OpenAI fallback. Merges into a complete 11-section strategy.
      </div>

      {running ? (
        <OrbitalLoader T={T} progress={progress} status={status} />
      ) : (
        <>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 12, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 11, fontWeight: 500, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Model</span>
            <select value={model} onChange={e => setModel(e.target.value)} style={{
              padding: '3px 8px', borderRadius: 5, border: `1px solid ${T.border}`, background: T.bgInput,
              color: T.text, fontSize: 12, fontFamily: 'inherit', height: 26,
            }}>
              <option value="sonnet">Claude Sonnet (Best)</option>
              <option value="haiku">Claude Haiku (Fast)</option>
              <option value="gpt4o">GPT-4o (Fallback)</option>
              <option value="gpt4o-mini">GPT-4o Mini (Fast/Cheap)</option>
            </select>
          </div>
          {error && (
            <div style={{ marginBottom: 10, padding: '8px 10px', borderRadius: 6, background: T.dangerBg, color: T.danger, fontSize: 12, display: 'flex', alignItems: 'flex-start', gap: 7, borderLeft: `3px solid ${T.danger}` }}>
              <Icon name="alertTriangle" size={13} color={T.danger} style={{ flexShrink: 0, marginTop: 1 }} />
              {error}
            </div>
          )}
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <Btn T={T} onClick={runStrategyLive}>
              <Icon name="play" size={13} /> Run Strategy (AI)
            </Btn>
            <Btn T={T} onClick={runStrategyDemo} variant="outline">
              Demo Data
            </Btn>
          </div>
        </>
      )}
    </div>
  );
}

      apiFetch('/strategy', { method: 'POST', body: JSON.stringify({ workspace_id: workspaceId, data: newStrat }) })
